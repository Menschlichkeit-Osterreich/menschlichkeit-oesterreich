global:
  scrape_interval: 60s
  evaluation_interval: 60s
  external_labels:
    organization: 'menschlichkeit-oesterreich'
    environment: 'production'

rule_files:
  - alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'fastapi'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8001']
    # Nach Hinzufügen von prometheus-fastapi-instrumentator:
    # pip install prometheus-fastapi-instrumentator

  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://menschlichkeit-oesterreich.at
          - https://api.menschlichkeit-oesterreich.at/health
          - https://crm.menschlichkeit-oesterreich.at
          - https://n8n.menschlichkeit-oesterreich.at/healthz
          - https://forum.menschlichkeit-oesterreich.at
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: 'blackbox-tls'
    metrics_path: /probe
    params:
      module: [tls_connect]
    static_configs:
      - targets:
          - menschlichkeit-oesterreich.at:443
          - api.menschlichkeit-oesterreich.at:443
          - crm.menschlichkeit-oesterreich.at:443
          - n8n.menschlichkeit-oesterreich.at:443
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
