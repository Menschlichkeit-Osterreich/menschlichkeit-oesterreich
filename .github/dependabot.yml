version: 2

# Dependabot — Menschlichkeit Österreich
# Nur öffentliche Registries → kein NPM_TOKEN / PACKAGIST_TOKEN nötig.
# Alle npm-Pakete kommen vom public npm-Registry (registry.npmjs.org).

updates:
  # Root npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Europe/Vienna"
    open-pull-requests-limit: 10
    reviewers:
      - "peschull"
    assignees:
      - "peschull"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # MCP File Server
  - package-ecosystem: "npm"
    directory: "/mcp-servers/file-server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Europe/Vienna"
    labels:
      - "dependencies"
      - "mcp"
    commit-message:
      prefix: "chore(mcp-deps)"

  # Frontend (apps/website)
  - package-ecosystem: "npm"
    directory: "/apps/website"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Europe/Vienna"
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(frontend-deps)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:00"
      timezone: "Europe/Vienna"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(actions)"

  # Python API (apps/api)
  - package-ecosystem: "pip"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "03:00"
      timezone: "Europe/Vienna"
    labels:
      - "dependencies"
      - "api"
      - "python"
    commit-message:
      prefix: "chore(api-deps)"
    allow:
      - dependency-type: "all"
    open-pull-requests-limit: 15

  # Python Legacy-API (api.menschlichkeit-oesterreich.at)
  - package-ecosystem: "pip"
    directory: "/api.menschlichkeit-oesterreich.at"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "03:30"
      timezone: "Europe/Vienna"
    labels:
      - "dependencies"
      - "api"
      - "python"
    commit-message:
      prefix: "chore(legacy-api-deps)"
    allow:
      - dependency-type: "all"
    open-pull-requests-limit: 10

  # PHP Composer (CRM/Drupal/CiviCRM)
  - package-ecosystem: "composer"
    directory: "/apps/crm"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "03:00"
      timezone: "Europe/Vienna"
    labels:
      - "dependencies"
      - "crm"
      - "php"
    commit-message:
      prefix: "chore(crm-deps)"
    allow:
      - dependency-type: "direct"
    open-pull-requests-limit: 5

  # Docker (n8n)
  - package-ecosystem: "docker"
    directory: "/automation/n8n"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "03:00"
      timezone: "Europe/Vienna"
    labels:
      - "dependencies"
      - "docker"
      - "n8n"
    commit-message:
      prefix: "chore(docker)"
