name: OWASP ZAP Baseline (manual)

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Ziel-URL (z. B. https://staging.menschlichkeit-oesterreich.at)'
        required: true

permissions:
  contents: read

jobs:
  zap:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@7d786b7217c158b8bb4c967a8e18cf22c9e8f5e9  # v0.14.0
        with:
          target: ${{ inputs.target }}
          allow_issue_writing: false
          fail_action: true
