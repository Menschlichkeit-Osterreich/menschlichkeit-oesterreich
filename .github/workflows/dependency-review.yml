name: Dependency Review
# PR-Gate: Blockiert neue verwundbare Dependencies bei PRs auf main/develop.
# Ergänzt den Nightly-Crosscheck von osv-scanner.yml.

on:
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read
  pull-requests: write  # Für comment-summary-in-pr

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Dependency Review
        uses: actions/dependency-review-action@3b139cfc5fae8b618d3eae3675e383bb1769c019  # v4.5.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          # Lizenzen ohne Kompatibilitätsrisiko explizit erlauben:
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD, Unlicense, CC0-1.0
          # Copyleft-Lizenzen im NGO-Kontext prüfen – bei Bedarf anpassen:
          # deny-licenses: GPL-2.0-only, GPL-3.0-only
          retry-on-snapshot-warnings: true
