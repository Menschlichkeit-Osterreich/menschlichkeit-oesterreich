name: deploy-forum

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'web/forum/**'

permissions:
  contents: read

concurrency:
  group: deploy-forum-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ============================================================
  # BSM — Bitwarden Secrets Manager Injection (optional)
  # ============================================================
  bsm-secrets:
    name: 'BSM: Forum Secrets laden'
    if: ${{ secrets.BW_ACCESS_TOKEN != '' }}
    uses: ./.github/workflows/reusable-bsm-secrets.yml
    with:
      profile: deploy-forum
    secrets:
      BW_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}

  deploy:
    name: Forum → Plesk (forum-production)
    runs-on: ubuntu-latest
    environment: forum-production
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: SSH known_hosts aus Secret einrichten
        run: |
          mkdir -p ~/.ssh
          # PLESK_KNOWN_HOSTS muss im GitHub-Environment 'forum-production' abgelegt sein.
          # Erzeugen via: ssh-keyscan -p <port> <host> auf vertrauenswürdigem System.
          printf '%s\n' "${{ secrets.PLESK_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Rsync zu Plesk
        # burnett01/rsync-deployments SHA-gepinnt (kein floating Tag)
        uses: burnett01/rsync-deployments@ea6bf48e0a41f53afbe82bfdc6a7cae52efff86b # 6.0.0
        with:
          switches: -avzr --delete
          path: web/forum/
          remote_path: /var/www/vhosts/menschlichkeit-oesterreich.at/subdomains/forum/httpdocs/
          remote_host: ${{ secrets.PLESK_HOST }}
          remote_user: ${{ secrets.PLESK_USER }}
          remote_key: ${{ secrets.PLESK_SSH_PRIVATE_KEY != '' && secrets.PLESK_SSH_PRIVATE_KEY || secrets.PLESK_SSH_KEY }}

      - name: Post-Deploy (Berechtigungen + Cache-Flush)
        # appleboy/ssh-action SHA-gepinnt
        uses: appleboy/ssh-action@2ead5e36573f08b82fbfce1504f1a3b3b6a9b970 # v1.2.2
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.PLESK_USER }}
          key: ${{ secrets.PLESK_SSH_PRIVATE_KEY != '' && secrets.PLESK_SSH_PRIVATE_KEY || secrets.PLESK_SSH_KEY }}
          script: |
            set -e
            FORUM_ROOT=/var/www/vhosts/menschlichkeit-oesterreich.at/subdomains/forum/httpdocs
            cd "$FORUM_ROOT"

            # Cache leeren
            find ./cache -type f -not -name 'index.htm*' -delete || true

            # Berechtigungen setzen (Plesk-Standard: psacln-Gruppe)
            chown -R "$USER":psacln ./cache ./files ./store ./images/avatars/upload
            chmod -R 775 ./cache ./files ./store ./images/avatars/upload

            # Design-Token-CSS prüfen
            if [ -f styles/moe-theme/theme/tokens.css ]; then
              echo "Design-Token-CSS vorhanden."
            fi

      - name: Forum-Erreichbarkeit prüfen
        run: |
          sleep 10
          HTTP_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            https://forum.menschlichkeit-oesterreich.at/)
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "301" ] && [ "$HTTP_STATUS" != "302" ]; then
            echo "Forum antwortet nicht korrekt: HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Forum erreichbar: HTTP $HTTP_STATUS"
