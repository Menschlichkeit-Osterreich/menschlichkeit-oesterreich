name: deploy-forum

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'web/forum/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: forum-production   # GitHub Environment – schützt via required reviewers / deployment rules
    steps:
      - uses: actions/checkout@v4

      - name: SSH known_hosts einrichten
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PLESK_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Rsync zu Plesk
        uses: burnett01/rsync-deployments@5.2
        with:
          switches: -avzr --delete
          path: web/forum/
          remote_path: /var/www/vhosts/menschlichkeit-oesterreich.at/subdomains/forum/httpdocs/
          remote_host: ${{ secrets.PLESK_HOST }}
          remote_user: ${{ secrets.PLESK_USER }}
          remote_key: ${{ secrets.PLESK_SSH_KEY }}

      - name: Post-Deploy (Berechtigungen + Cache-Flush)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.PLESK_USER }}
          key: ${{ secrets.PLESK_SSH_KEY }}
          script: |
            set -e
            FORUM_ROOT=/var/www/vhosts/menschlichkeit-oesterreich.at/subdomains/forum/httpdocs
            cd "$FORUM_ROOT"

            # Cache leeren
            find ./cache -type f -not -name 'index.htm*' -delete || true

            # Berechtigungen setzen (Plesk-Standard: psacln-Gruppe)
            chown -R "$USER":psacln ./cache ./files ./store ./images/avatars/upload
            chmod -R 775 ./cache ./files ./store ./images/avatars/upload

            # Design-Token-CSS kopieren (styles/prosilver/theme/tokens.css)
            if [ -f styles/moe-theme/theme/tokens.css ]; then
              echo "Design-Token-CSS vorhanden."
            fi

      - name: Forum-Erreichbarkeit prüfen
        run: |
          sleep 10
          HTTP_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            https://forum.menschlichkeit-oesterreich.at/)
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "301" ] && [ "$HTTP_STATUS" != "302" ]; then
            echo "Forum antwortet nicht korrekt: HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Forum erreichbar: HTTP $HTTP_STATUS"
