# Reusable Workflow: Bitwarden Secrets Manager → GitHub Actions Injection
#
# Nutzt bitwarden/sm-action@v2 um Secrets aus dem EU-Vault zu laden
# und als maskierte Umgebungsvariablen bereitzustellen.
#
# Verwendung in anderen Workflows:
#   jobs:
#     get-secrets:
#       uses: ./.github/workflows/reusable-bsm-secrets.yml
#       with:
#         profile: deploy-production
#       secrets:
#         BW_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
#
# Jedes Profil definiert eine Gruppe von Secrets, die zusammen
# benötigt werden (z.B. alle Deployment-Secrets für Produktion).
# Die Secret-UUIDs werden in .github/bsm-secret-ids.json verwaltet.

name: '[Reusable] BSM Secret Injection'

on:
  workflow_call:
    inputs:
      profile:
        description: >
          Secret-Profil (welche Gruppe von Secrets geladen wird).
          Verfügbare Profile: deploy-production, deploy-staging,
          deploy-forum, api-tests, n8n-automation, openclaw, infra
        required: true
        type: string
    secrets:
      BW_ACCESS_TOKEN:
        description: 'Bitwarden SM Access Token (Service Account sa-cicd)'
        required: false
    outputs:
      injected:
        description: 'Komma-separierte Liste der injizierten Variablennamen'
        value: ${{ jobs.inject.outputs.injected }}

permissions:
  contents: read

jobs:
  inject:
    name: 'BSM: ${{ inputs.profile }}'
    runs-on: ubuntu-latest
    outputs:
      injected: ${{ steps.inject-secrets.outputs.injected }}

    steps:
      # ── Profil: deploy-production ─────────────────────────────
      # Plesk-Deployment: SSH-Keys, Host-Daten, DB-Credentials
      - name: 'BSM → Deploy Production Secrets'
        if: inputs.profile == 'deploy-production'
        uses: bitwarden/sm-action@v2
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.eu
          secrets: |
            ${{ vars.BSM_INFRA_SSH_PRIVATE_KEY }}  > PLESK_SSH_PRIVATE_KEY
            ${{ vars.BSM_INFRA_SSH_KNOWN_HOSTS }}  > PLESK_KNOWN_HOSTS
            ${{ vars.BSM_INFRA_PLESK_HOST }}       > PLESK_HOST
            ${{ vars.BSM_INFRA_PLESK_USER }}       > PLESK_USER
            ${{ vars.BSM_INFRA_PLESK_PORT }}       > PLESK_PORT
            ${{ vars.BSM_API_DATABASE_URL }}        > DATABASE_URL
            ${{ vars.BSM_API_MOE_API_TOKEN }}       > MOE_API_TOKEN

      # ── Profil: deploy-forum ──────────────────────────────────
      # Forum-Deployment: SSH-Keys, Host-Daten (gleiche Plesk-Instanz)
      - name: 'BSM → Deploy Forum Secrets'
        if: inputs.profile == 'deploy-forum'
        uses: bitwarden/sm-action@v2
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.eu
          secrets: |
            ${{ vars.BSM_INFRA_SSH_PRIVATE_KEY }}  > PLESK_SSH_KEY
            ${{ vars.BSM_INFRA_SSH_KNOWN_HOSTS }}  > PLESK_KNOWN_HOSTS
            ${{ vars.BSM_INFRA_PLESK_HOST }}       > PLESK_HOST
            ${{ vars.BSM_INFRA_PLESK_USER }}       > PLESK_USER

      # ── Profil: deploy-staging ────────────────────────────────
      # Staging-Deployment: SSH-Keys, Host-Daten
      - name: 'BSM → Deploy Staging Secrets'
        if: inputs.profile == 'deploy-staging'
        uses: bitwarden/sm-action@v2
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.eu
          secrets: |
            ${{ vars.BSM_STAGING_SSH_PRIVATE_KEY }}  > STAGING_DEPLOY_KEY
            ${{ vars.BSM_STAGING_SSH_KNOWN_HOSTS }}  > STAGING_KNOWN_HOSTS
            ${{ vars.BSM_STAGING_REMOTE_HOST }}       > STAGING_REMOTE_HOST
            ${{ vars.BSM_STAGING_REMOTE_USER }}       > STAGING_REMOTE_USER
            ${{ vars.BSM_STAGING_REMOTE_PORT }}       > STAGING_REMOTE_PORT

      # ── Profil: api-tests ─────────────────────────────────────
      # API-Tests: CiviCRM, JWT, Webhook-Secrets
      - name: 'BSM → API Test Secrets'
        if: inputs.profile == 'api-tests'
        uses: bitwarden/sm-action@v2
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.eu
          secrets: |
            ${{ vars.BSM_API_CIVICRM_SITE_KEY }}    > CIVICRM_SITE_KEY
            ${{ vars.BSM_API_CIVICRM_API_KEY }}     > CIVICRM_API_KEY
            ${{ vars.BSM_API_JWT_SECRET_KEY }}       > JWT_SECRET_KEY
            ${{ vars.BSM_API_N8N_WEBHOOK_SECRET }}   > N8N_WEBHOOK_SECRET

      # ── Profil: n8n-automation ────────────────────────────────
      # n8n: Encryption Key, DB, Redis, API-Token
      - name: 'BSM → n8n Automation Secrets'
        if: inputs.profile == 'n8n-automation'
        uses: bitwarden/sm-action@v2
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.eu
          secrets: |
            ${{ vars.BSM_N8N_ENCRYPTION_KEY }}      > N8N_ENCRYPTION_KEY
            ${{ vars.BSM_N8N_DB_PASSWORD }}          > N8N_DB_PASSWORD
            ${{ vars.BSM_N8N_PASSWORD }}             > N8N_PASSWORD
            ${{ vars.BSM_N8N_REDIS_PASSWORD }}       > REDIS_PASSWORD
            ${{ vars.BSM_API_MOE_API_TOKEN }}        > MOE_API_TOKEN

      # ── Profil: openclaw ──────────────────────────────────────
      # OpenClaw: AI-Keys, DB, Redis, Qdrant
      - name: 'BSM → OpenClaw Secrets'
        if: inputs.profile == 'openclaw'
        uses: bitwarden/sm-action@v2
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.eu
          secrets: |
            ${{ vars.BSM_OC_OPENAI_API_KEY }}       > OC_OPENAI_API_KEY
            ${{ vars.BSM_OC_GITHUB_TOKEN }}         > OC_GITHUB_TOKEN
            ${{ vars.BSM_OC_PG_DSN }}               > OC_PG_DSN
            ${{ vars.BSM_OC_REDIS_URL }}            > OC_REDIS_URL

      # ── Profil: infra ─────────────────────────────────────────
      # Infrastruktur: Postgres, S3, SSH
      - name: 'BSM → Infrastructure Secrets'
        if: inputs.profile == 'infra'
        uses: bitwarden/sm-action@v2
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.eu
          secrets: |
            ${{ vars.BSM_INFRA_POSTGRES_PASSWORD }} > POSTGRES_PASSWORD
            ${{ vars.BSM_INFRA_SSH_PRIVATE_KEY }}   > SSH_PRIVATE_KEY
            ${{ vars.BSM_INFRA_S3_ACCESS_KEY }}     > S3_ACCESS_KEY_ID
            ${{ vars.BSM_INFRA_S3_SECRET_KEY }}     > S3_SECRET_ACCESS_KEY

      # ── Ergebnis-Zusammenfassung ──────────────────────────────
      - name: Injizierte Secrets dokumentieren
        id: inject-secrets
        run: |
          echo "✅ BSM-Profil '${{ inputs.profile }}' erfolgreich geladen"
          echo "injected=${{ inputs.profile }}" >> "$GITHUB_OUTPUT"
          echo "### 🔐 BSM Secret Injection" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Profil:** \`${{ inputs.profile }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Vault:** EU (vault.bitwarden.eu)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ✅ Erfolgreich" >> "$GITHUB_STEP_SUMMARY"
