# Reusable Workflow: Bitwarden Secrets Manager → GitHub Actions Injection
#
# Laedt Secrets aus dem EU-Vault via bws CLI (lokal oder Docker-Fallback)
# und stellt sie als maskierte Workflow-Outputs bereit.
#
# Verwendung in anderen Workflows:
#   jobs:
#     get-secrets:
#       uses: ./.github/workflows/reusable-bsm-secrets.yml
#       with:
#         profile: deploy-production
#       secrets:
#         BW_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
#
# Jedes Profil definiert eine Gruppe von Secrets, die zusammen
# benötigt werden (z.B. alle Deployment-Secrets für Produktion).
# Die Secret-UUIDs werden in .github/bsm-secret-ids.json verwaltet.

name: '[Reusable] BSM Secret Injection'

on:
  workflow_call:
    inputs:
      profile:
        description: >
          Secret-Profil (welche Gruppe von Secrets geladen wird).
          Verfügbare Profile: deploy-production, deploy-staging,
          deploy-forum, api-tests, n8n-automation, infra
        required: true
        type: string
    secrets:
      BW_ACCESS_TOKEN:
        description: 'Bitwarden SM Access Token (Service Account sa-cicd)'
        required: true
    outputs:
      injected:
        description: 'Komma-separierte Liste der injizierten Variablennamen'
        value: ${{ jobs.inject.outputs.injected }}
      MICROSOFT_TENANT_ID:
        description: 'Microsoft Graph Tenant ID für Mail-API'
        value: ${{ jobs.inject.outputs.MICROSOFT_TENANT_ID }}
      MICROSOFT_CLIENT_ID:
        description: 'Microsoft Graph Client ID für Mail-API'
        value: ${{ jobs.inject.outputs.MICROSOFT_CLIENT_ID }}
      MICROSOFT_CLIENT_SECRET:
        description: 'Microsoft Graph Client Secret für Mail-API'
        value: ${{ jobs.inject.outputs.MICROSOFT_CLIENT_SECRET }}
      MICROSOFT_GRAPH_SENDER:
        description: 'Microsoft Graph Sender Email für Mail-API'
        value: ${{ jobs.inject.outputs.MICROSOFT_GRAPH_SENDER }}
      ALERTS_SLACK_WEBHOOK:
        description: 'Slack Webhook für Deployment-Alerts'
        value: ${{ jobs.inject.outputs.ALERTS_SLACK_WEBHOOK }}

permissions:
  contents: read

jobs:
  inject:
    name: 'BSM: ${{ inputs.profile }}'
    runs-on: ubuntu-latest
    outputs:
      injected: ${{ steps.inject-secrets.outputs.injected }}
      MICROSOFT_TENANT_ID: ${{ steps.inject-secrets.outputs.MICROSOFT_TENANT_ID }}
      MICROSOFT_CLIENT_ID: ${{ steps.inject-secrets.outputs.MICROSOFT_CLIENT_ID }}
      MICROSOFT_CLIENT_SECRET: ${{ steps.inject-secrets.outputs.MICROSOFT_CLIENT_SECRET }}
      MICROSOFT_GRAPH_SENDER: ${{ steps.inject-secrets.outputs.MICROSOFT_GRAPH_SENDER }}
      ALERTS_SLACK_WEBHOOK: ${{ steps.inject-secrets.outputs.ALERTS_SLACK_WEBHOOK }}

    steps:
      - name: Checkout (BSM-Mapping laden)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: BSM laden + Outputs setzen
        id: inject-secrets
        env:
          BW_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
          BSM_PROFILE: ${{ inputs.profile }}
        run: |
          set -euo pipefail

          MAP_FILE=".github/bsm-secret-ids.json"
          if [ ! -f "$MAP_FILE" ]; then
            echo "✗ Mapping-Datei fehlt: $MAP_FILE"
            exit 1
          fi

          if [ -z "${BW_ACCESS_TOKEN:-}" ]; then
            echo "✗ BW_ACCESS_TOKEN fehlt"
            exit 1
          fi

          if ! command -v jq >/dev/null 2>&1; then
            echo "✗ jq fehlt auf Runner"
            exit 1
          fi

          fetch_secret_value() {
            local uuid="$1"
            local json=""
            local value=""

            if command -v bws >/dev/null 2>&1; then
              if ! json=$(BWS_ACCESS_TOKEN="$BW_ACCESS_TOKEN" bws secret get "$uuid" --output json --server-url https://vault.bitwarden.eu); then
                echo "✗ BSM-Abfrage fehlgeschlagen (bws) für UUID ${uuid}"
                exit 1
              fi
            elif command -v docker >/dev/null 2>&1; then
              if ! json=$(docker run --rm -e "BWS_ACCESS_TOKEN=$BW_ACCESS_TOKEN" ghcr.io/bitwarden/bws secret get "$uuid" --output json --server-url https://vault.bitwarden.eu); then
                echo "✗ BSM-Abfrage fehlgeschlagen (docker-bws) für UUID ${uuid}"
                exit 1
              fi
            else
              echo "✗ Weder bws noch Docker verfuegbar"
              exit 1
            fi

            value=$(printf '%s' "$json" | jq -r '.value // empty')
            if [ -z "$value" ] || [ "$value" = "null" ]; then
              echo "✗ BSM-Secret leer oder nicht gefunden für UUID ${uuid}"
              exit 1
            fi

            printf '%s' "$value"
          }

          resolve_uuid() {
            local env_var="$1"
            jq -r --arg profile "$BSM_PROFILE" --arg env_var "$env_var" '
              .profiles[$profile].secrets[]?
              | select(.env_var == $env_var)
              | .uuid
            ' "$MAP_FILE" | head -n1
          }

          TENANT_UUID=$(resolve_uuid "MICROSOFT_TENANT_ID")
          CLIENT_ID_UUID=$(resolve_uuid "MICROSOFT_CLIENT_ID")
          CLIENT_SECRET_UUID=$(resolve_uuid "MICROSOFT_CLIENT_SECRET")
          GRAPH_SENDER_UUID=$(resolve_uuid "MICROSOFT_GRAPH_SENDER")
          SLACK_WEBHOOK_UUID=$(resolve_uuid "ALERTS_SLACK_WEBHOOK")

          for required_uuid in "$TENANT_UUID" "$CLIENT_ID_UUID" "$CLIENT_SECRET_UUID" "$GRAPH_SENDER_UUID" "$SLACK_WEBHOOK_UUID"; do
            if [ -z "$required_uuid" ] || [ "$required_uuid" = "null" ]; then
              echo "✗ Unvollstaendiges Mapping fuer Profil '$BSM_PROFILE'"
              exit 1
            fi
          done

          TENANT=$(fetch_secret_value "$TENANT_UUID")
          CLIENT_ID=$(fetch_secret_value "$CLIENT_ID_UUID")
          CLIENT_SECRET=$(fetch_secret_value "$CLIENT_SECRET_UUID")
          GRAPH_SENDER=$(fetch_secret_value "$GRAPH_SENDER_UUID")
          SLACK_WEBHOOK=$(fetch_secret_value "$SLACK_WEBHOOK_UUID")

          for required_value in "$TENANT" "$CLIENT_ID" "$CLIENT_SECRET" "$GRAPH_SENDER" "$SLACK_WEBHOOK"; do
            if [ -z "$required_value" ]; then
              echo "✗ Mindestens ein erforderlicher BSM-Wert ist leer"
              exit 1
            fi
          done

          [ -n "${TENANT:-}" ] && echo "::add-mask::${TENANT}"
          [ -n "${CLIENT_ID:-}" ] && echo "::add-mask::${CLIENT_ID}"
          [ -n "${CLIENT_SECRET:-}" ] && echo "::add-mask::${CLIENT_SECRET}"
          [ -n "${GRAPH_SENDER:-}" ] && echo "::add-mask::${GRAPH_SENDER}"
          [ -n "${SLACK_WEBHOOK:-}" ] && echo "::add-mask::${SLACK_WEBHOOK}"

          echo "MICROSOFT_TENANT_ID=${TENANT}" >> "$GITHUB_OUTPUT"
          echo "MICROSOFT_CLIENT_ID=${CLIENT_ID}" >> "$GITHUB_OUTPUT"
          echo "MICROSOFT_CLIENT_SECRET=${CLIENT_SECRET}" >> "$GITHUB_OUTPUT"
          echo "MICROSOFT_GRAPH_SENDER=${GRAPH_SENDER}" >> "$GITHUB_OUTPUT"
          echo "ALERTS_SLACK_WEBHOOK=${SLACK_WEBHOOK}" >> "$GITHUB_OUTPUT"
          echo "injected=${{ inputs.profile }}" >> "$GITHUB_OUTPUT"

          echo "✅ Profil '${{ inputs.profile }}' verarbeitet"
          echo "### 🔐 BSM Secret Injection" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Profil:** \`${{ inputs.profile }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Quelle:** Bitwarden Secrets Manager (bws + UUID-Mapping)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Handoff:** über reusable workflow outputs" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ✅ Erfolgreich" >> "$GITHUB_STEP_SUMMARY"
