name: MCP Server Tests

on:
  push:
    branches: [main, master, chore/**, feature/**]
    paths:
      - 'mcp-servers/file-server/**'
      - '.github/workflows/mcp-tests.yml'
  pull_request:
    paths:
      - 'mcp-servers/file-server/**'

permissions:
  contents: read

jobs:
  test-file-server:
    name: MCP Server Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: true
      MCP_OPA_REQUIRED: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v4.2.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies (root)
        run: npm install --silent

      - name: Install workspace deps (file-server)
        working-directory: mcp-servers/file-server
        run: npm install --silent

      - name: Run tests (file-server)
        working-directory: mcp-servers/file-server
        run: npm test
