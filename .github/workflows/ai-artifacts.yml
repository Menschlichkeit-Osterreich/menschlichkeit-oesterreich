name: AI Artifacts

on:
  push:
    branches: [main, master]
    paths:
      - 'scripts/ai/**'
      - 'docs/ai/**'
      - 'docker-compose*.yml'
      - 'apps/**'
      - 'api.menschlichkeit-oesterreich.at/**'
      - '.github/workflows/ai-artifacts.yml'
  pull_request:
    paths:
      - 'scripts/ai/**'
      - 'docs/ai/**'
      - 'docker-compose*.yml'
      - 'apps/**'
      - 'api.menschlichkeit-oesterreich.at/**'
      - '.github/workflows/ai-artifacts.yml'
  workflow_dispatch: {}

jobs:
  build-ai-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema

      - name: Generate AI artifacts
        run: |
          python3 scripts/ai/generate_repo_manifest.py
          python3 scripts/ai/generate_service_map.py
          python3 scripts/ai/generate_dependency_graph.py
          python3 scripts/ai/generate_data_flows.py
          python3 scripts/ai/generate_entrypoints.py

      - name: Validate artifacts against schemas
        run: python3 scripts/ai/validate_ai_artifacts.py

      - name: Check for unstaged diffs
        run: |
          # Exclude repo-manifest.json: it embeds commit_sha via HEAD^ which is inherently
          # dynamic and cannot match the committed value in the same run.
          # Semantic artifacts (service-map, dependency-graph, entrypoints, data-flows) are checked.
          SEMANTIC_FILES="docs/ai/service-map.json docs/ai/dependency-graph.json docs/ai/entrypoints.json docs/ai/data-flows.json"
          if ! git diff --quiet -- $SEMANTIC_FILES; then
            echo "AI artifacts changed. Commit regenerated docs/ai outputs."
            git --no-pager diff -- $SEMANTIC_FILES
            exit 1
          fi

      - name: Upload AI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-read-layer-artifacts
          path: |
            docs/ai/*.json
            docs/ai/llms.txt
            docs/ai/schemas/*.json
