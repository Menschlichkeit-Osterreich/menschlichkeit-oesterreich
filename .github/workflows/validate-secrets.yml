name: Validate Secrets
# Prüft nur nicht-deployment-spezifische Secrets und .env.example-Templates.
# WICHTIG: Deployment-Secrets (SSH, DB, Plesk) gehören in GitHub Environments
# (production, staging, forum-production) und werden hier NICHT geprüft,
# da sie außerhalb des Environment-Kontexts nicht verfügbar sein sollen.

on:
  push:
    branches: [main, develop, chore/**, feature/**]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    # Tägliche Validierung 07:00 UTC
    - cron: '0 7 * * *'

permissions:
  contents: read

jobs:
  validate-env-template:
    name: Root- und Test-Templates prüfen
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.12'

      - name: Root .env.example validieren
        run: python scripts/validate-secrets.py --mode template --file .env.example

      - name: Root .env.production.template validieren
        run: python scripts/validate-secrets.py --mode template --file .env.production.template

      - name: Root .env.test.example validieren
        run: python scripts/validate-secrets.py --mode template --file .env.test.example

      - name: Keine echten Secrets in Root-Templates
        run: |
          if grep -qE "(ghp_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]+|sk_live_|xoxb-[0-9]+-)" .env.example .env.production.template .env.test.example; then
            echo "::error::Echte API-Keys in Root-Templates gefunden!"
            exit 1
          fi
          echo "✅ Root-Templates sind sauber"

      - name: SECRETS-AUDIT.md vorhanden prüfen
        run: |
          if [ ! -f secrets/SECRETS-AUDIT.md ]; then
            echo "::error::secrets/SECRETS-AUDIT.md fehlt!"
            exit 1
          fi
          echo "✅ SECRETS-AUDIT.md vorhanden"

      - name: .env.vault ist nicht getrackt
        run: |
          if git ls-files --error-unmatch .env.vault >/dev/null 2>&1; then
            echo "::error::.env.vault darf nicht im öffentlichen Repository getrackt sein"
            exit 1
          fi
          echo "✅ .env.vault nicht im Repo"

      - name: Summary
        run: |
          echo "### Secret-Template-Validierung" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ Root-Templates validiert" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ Keine echten Secrets committed" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ SECRETS-AUDIT.md aktuell" >> "$GITHUB_STEP_SUMMARY"

  validate-non-deploy-secrets:
    name: Nicht-Deployment-Secrets prüfen (Repo-Scope)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Nur nicht-deployment-spezifische Secrets werden hier geprüft.
    # Deployment-Secrets (PLESK_*, DB_*, SSH_*) gehören in Environments.

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Optionale Integrations-Secrets prüfen
        env:
          CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
          N8N_ENCRYPTION_KEY: ${{ secrets.N8N_ENCRYPTION_KEY }}
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
        run: |
          check_optional() {
            local name=$1
            local value=$2
            if [ -z "$value" ]; then
              echo "⚠️  OPTIONAL (nicht gesetzt): $name"
            else
              echo "✅ Konfiguriert: $name"
            fi
          }

          echo "=== Integrations-Secrets (optional) ==="
          check_optional "CODACY_API_TOKEN"   "$CODACY_API_TOKEN"
          check_optional "CODACY_PROJECT_TOKEN" "$CODACY_PROJECT_TOKEN"
          check_optional "SEMGREP_APP_TOKEN"  "$SEMGREP_APP_TOKEN"
          check_optional "N8N_ENCRYPTION_KEY" "$N8N_ENCRYPTION_KEY"
          check_optional "N8N_WEBHOOK_URL"    "$N8N_WEBHOOK_URL"
          echo ""
          echo "Hinweis: Deployment-Secrets (PLESK_*, DB_*, STAGING_*) werden"
          echo "ausschließlich in GitHub Environments (production/staging/forum-production) geprüft."

  validate-env-examples:
    name: .env.example Dateien prüfen
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Service .env.example Dateien validieren
        run: |
          EXIT_CODE=0
          FILES=(
            "apps/api/.env.example"
            "apps/website/.env.example"
            "automation/n8n/.env.example"
          )
          for file in "${FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ Vorhanden: $file"
              python scripts/validate-secrets.py --mode template --file "$file" || EXIT_CODE=$?
            else
              echo "❌ Fehlt: $file"
              EXIT_CODE=1
            fi
          done
          exit $EXIT_CODE

      - name: Gesamten Env-Vertrag validieren
        run: python scripts/validate-secrets.py --mode suite

  validate-secrets-gate:
    name: Validate Secrets Gate
    runs-on: ubuntu-latest
    needs:
      - validate-env-template
      - validate-non-deploy-secrets
      - validate-env-examples
    if: always()
    steps:
      - name: Fail if any secret validation job failed
        run: |
          results="${{ needs.validate-env-template.result }} ${{ needs.validate-non-deploy-secrets.result }} ${{ needs.validate-env-examples.result }}"
          echo "Validate Secrets results: $results"
          if echo "$results" | grep -Eq 'failure|cancelled|skipped'; then
            echo "::error::At least one secret validation job did not succeed."
            exit 1
          fi
