name: n8n Smoke Test

on:
  workflow_dispatch:
  push:
    paths:
      - 'automation/n8n/**'
      - '.github/workflows/n8n-smoke.yml'

permissions:
  contents: read

jobs:
  smoke:
    name: n8n Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.12'
      - name: Run smoke test (skips if N8N_BASE_URL unset)
        env:
          N8N_BASE_URL: ${{ secrets.N8N_BASE_URL }}
          N8N_WEBHOOK_SECRET: ${{ secrets.N8N_WEBHOOK_SECRET }}
        run: |
          if [ -z "${N8N_BASE_URL}" ]; then
            echo "N8N_BASE_URL not set; skipping."; exit 0; fi
          python3 automation/n8n/smoke-test.py
