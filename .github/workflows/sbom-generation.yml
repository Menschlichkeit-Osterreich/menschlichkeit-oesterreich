name: SBOM Generation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read
  id-token: write  # Required for OIDC-based cosign signing

jobs:
  sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Validate SBOM (CycloneDX CLI)
        run: |
          # Install CycloneDX CLI for validation
          npm install -g @cyclonedx/cyclonedx-npm --prefer-offline 2>/dev/null || true
          if npx -y @cyclonedx/cyclonedx-cli --version >/dev/null 2>&1; then
            npx @cyclonedx/cyclonedx-cli validate --input-file sbom.cyclonedx.json \
              --input-format json --input-version v1_6 \
              && echo "✅ SBOM validated against CycloneDX 1.6 schema" \
              || echo "⚠️ SBOM validation returned warnings"
          else
            echo "⚠️ CycloneDX CLI not available; skipping schema validation"
          fi

      - name: Sign SBOM with cosign (OIDC)
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          # Install cosign
          COSIGN_VERSION="v2.4.1"
          curl -sSfL "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" \
            -o /usr/local/bin/cosign
          chmod +x /usr/local/bin/cosign
          # Sign the SBOM using keyless OIDC (Sigstore)
          cosign sign-blob sbom.cyclonedx.json \
            --output-certificate sbom.cyclonedx.json.pem \
            --output-signature sbom.cyclonedx.json.sig \
            --yes
          echo "✅ SBOM signed via OIDC (Sigstore keyless)"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: |
            sbom.cyclonedx.json
            sbom.cyclonedx.json.pem
            sbom.cyclonedx.json.sig
          if-no-files-found: warn
