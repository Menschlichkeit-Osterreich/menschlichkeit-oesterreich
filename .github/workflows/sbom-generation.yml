name: SBOM Generation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read

jobs:
  sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Generate SBOM
        uses: anchore/sbom-action@fc46e51fd3ca173a6fcf9b99e00b3c2440dd5edd  # v0.18.0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Validate SBOM (CycloneDX CLI)
        run: |
          # CycloneDX CLI is a Go binary released at https://github.com/CycloneDX/cyclonedx-cli
          # (not an npm package — @cyclonedx/cyclonedx-npm is the generator, not the validator)
          CDXCLI_VERSION="v0.27.1"
          CDXCLI_URL="https://github.com/CycloneDX/cyclonedx-cli/releases/download/${CDXCLI_VERSION}/cyclonedx-linux-x64"
          if curl -sSfL "$CDXCLI_URL" -o /usr/local/bin/cyclonedx-cli 2>/dev/null; then
            chmod +x /usr/local/bin/cyclonedx-cli
            cyclonedx-cli validate --input-file sbom.cyclonedx.json \
              --input-format json --input-version v1_6 \
              && echo "✅ SBOM validated against CycloneDX 1.6 schema" \
              || echo "⚠️ SBOM validation returned warnings"
          else
            echo "⚠️ CycloneDX CLI binary unavailable; skipping schema validation"
          fi

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          if-no-files-found: error

  sbom-sign:
    name: Sign CycloneDX SBOM
    runs-on: ubuntu-latest
    needs: sbom
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download SBOM artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444306234f5d70e8f8d04eea  # v4.1.8
        with:
          name: sbom-cyclonedx
          path: .

      - name: Install cosign via sigstore/cosign-installer
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da  # v3.7.0

      - name: Sign SBOM with cosign (OIDC)
        run: |
          cosign sign-blob sbom.cyclonedx.json \
            --output-certificate sbom.cyclonedx.json.pem \
            --output-signature sbom.cyclonedx.json.sig \
            --yes
          echo "✅ SBOM signed via OIDC (Sigstore keyless)"

      - name: Upload signed SBOM artifacts
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        with:
          name: sbom-cyclonedx-signed
          path: |
            sbom.cyclonedx.json
            sbom.cyclonedx.json.pem
            sbom.cyclonedx.json.sig
          if-no-files-found: warn
