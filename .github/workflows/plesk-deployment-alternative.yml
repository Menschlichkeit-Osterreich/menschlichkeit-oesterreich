# DEAKTIVIERT: Dieser Workflow ist redundant zu deploy-plesk.yml.
# Push-Trigger entfernt um Race Conditions mit deploy-plesk.yml zu vermeiden.
# Bitte deploy-plesk.yml verwenden.

name: Deploy to Plesk (LEGACY — deaktiviert)
on:
  workflow_dispatch:
    inputs:
      note:
        description: "ACHTUNG: Dieser Workflow ist deaktiviert. Bitte deploy-plesk.yml verwenden."
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "22"

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.PLESK_FTP_HOST }}
          username: ${{ secrets.PLESK_FTP_USER }}
          password: ${{ secrets.PLESK_PASSWORD }}
          local-dir: ./
          server-dir: /var/www/vhosts/menschlichkeit-oesterreich.at/
