name: Quality

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  quality:
    name: Lint & Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.2.0
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f pnpm-lock.yaml ]]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [[ -f yarn.lock ]]; then
            corepack enable
            yarn install --frozen-lockfile
          elif [[ -f package-lock.json ]]; then
            npm ci --no-audit --no-fund
          elif [[ -f package.json ]]; then
            npm i --no-audit --no-fund
          else
            echo "No package.json — skipping install."
          fi

      - name: ESLint
        run: npm run lint

      - name: Docs Governance
        run: npm run docs:governance

      - name: ESLint SARIF
        run: |
          npx eslint . --format @microsoft/eslint-formatter-sarif --output-file eslint.sarif || true

      - name: Upload SARIF (non-fork PRs only)
        if: |
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) &&
          hashFiles('eslint.sarif') != ''
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v3.28.1
        with:
          sarif_file: eslint.sarif
          category: eslint
