name: Docs Lint & ADR Index

on:
  pull_request:
    paths:
      - 'docs/**'
      - '**/*.md'
      - 'scripts/docs/generate-adr-index.mjs'
      - '.github/workflows/docs-lint-and-adr-index.yml'
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - '**/*.md'
      - 'scripts/docs/generate-adr-index.mjs'

permissions:
  contents: read

jobs:
  docs:
    name: Docs Lint & ADR Index
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v4.2.0
        with:
          node-version: '22'

      - name: Markdown Lint
        run: npx -y markdownlint-cli "**/*.md" --ignore node_modules --ignore vendor || true

      - name: Generate ADR Index (no commit)
        run: node scripts/docs/generate-adr-index.mjs

      - name: Upload ADR Index
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        with:
          name: adr-index
          path: docs/architecture/ADRs/ADR-INDEX.md
