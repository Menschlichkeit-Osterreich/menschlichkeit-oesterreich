name: OSV Scanner

on:
  push:
    branches: [main, master, chore/**, feature/**]
  pull_request:
    branches: [main, master]
  schedule:
    # Daily scan at 5:00 UTC
    - cron: '0 5 * * *'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  osv-scanner:
    name: OSV Vulnerability Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install osv-scanner
        run: |
          curl -sSfL https://raw.githubusercontent.com/google/osv-scanner/main/scripts/install-osv-scanner-ubuntu.sh | sh -s -- -b /usr/local/bin
          osv-scanner --version

      - name: Run OSV Scanner (recursive)
        run: |
          osv-scanner \
            --format=sarif \
            --output=osv-results.sarif \
            --recursive \
            ./
        continue-on-error: true

      - name: Upload OSV Scanner results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: osv-scanner-results
          path: osv-results.sarif
          retention-days: 30

  osv-lockfile:
    name: OSV Lockfile Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install osv-scanner
        run: |
          curl -sSfL https://raw.githubusercontent.com/google/osv-scanner/main/scripts/install-osv-scanner-ubuntu.sh | sh -s -- -b /usr/local/bin
          osv-scanner --version

      - name: Scan package-lock.json
        if: hashFiles('**/package-lock.json') != ''
        run: |
          osv-scanner \
            --lockfile=package-lock.json:npm
        continue-on-error: true

      - name: Scan composer.lock
        if: hashFiles('**/composer.lock') != ''
        run: |
          osv-scanner \
            --lockfile=composer.lock:composer
        continue-on-error: true

      - name: Scan requirements.txt
        if: hashFiles('**/requirements.txt') != ''
        run: |
          osv-scanner \
            --lockfile=apps/api/requirements.txt:requirements.txt
        continue-on-error: true
