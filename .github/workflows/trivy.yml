name: Trivy Scans

on:
  push:
    branches: [main, develop, chore/**, feature/**]
  pull_request:
    branches: [main, develop]
  schedule:
    # Täglich 04:00 UTC
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: trivy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  trivy-fs:
    name: Trivy Filesystem & Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run Trivy vulnerability scanner (Filesystem)
        id: trivy_fs
        shell: bash
        run: |
          set +e
          docker run --rm \
            -v "$PWD:/repo" \
            aquasec/trivy:latest \
            fs \
            --scanners vuln,secret,config \
            --severity CRITICAL,HIGH,MEDIUM \
            --ignore-unfixed \
            --format sarif \
            --output /repo/trivy-fs-results.sarif \
            --exit-code 0 \
            /repo
          status=$?
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Trivy FS results to GitHub Security tab
        if: always() && hashFiles('trivy-fs-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@45775bd8235c68ba998cffa5171334d58593da47  # v3.28.1
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem

      - name: Upload FS results as artifact
        if: always() && hashFiles('trivy-fs-results.sarif') != ''
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        with:
          name: trivy-fs-results
          path: trivy-fs-results.sarif
          retention-days: 30

      - name: Trivy FS summary
        if: always()
        run: |
          echo "## Trivy Filesystem" >> "$GITHUB_STEP_SUMMARY"
          echo "- Exit-Code: ${{ steps.trivy_fs.outputs.exit_code || '0' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- SARIF: ${{ hashFiles('trivy-fs-results.sarif') != '' && 'vorhanden' || 'nicht erzeugt' }}" >> "$GITHUB_STEP_SUMMARY"

  trivy-config:
    name: Trivy Config (IaC/Misconfig)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run Trivy misconfiguration scanner
        id: trivy_config
        shell: bash
        run: |
          set +e
          docker run --rm \
            -v "$PWD:/repo" \
            aquasec/trivy:latest \
            config \
            --severity CRITICAL,HIGH,MEDIUM \
            --format sarif \
            --output /repo/trivy-config-results.sarif \
            --exit-code 0 \
            /repo
          status=$?
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Trivy Config results to GitHub Security tab
        if: always() && hashFiles('trivy-config-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@45775bd8235c68ba998cffa5171334d58593da47  # v3.28.1
        with:
          sarif_file: trivy-config-results.sarif
          category: trivy-config

      - name: Upload Config results as artifact
        if: always() && hashFiles('trivy-config-results.sarif') != ''
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        with:
          name: trivy-config-results
          path: trivy-config-results.sarif
          retention-days: 30

      - name: Trivy config summary
        if: always()
        run: |
          echo "## Trivy Config" >> "$GITHUB_STEP_SUMMARY"
          echo "- Exit-Code: ${{ steps.trivy_config.outputs.exit_code || '0' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- SARIF: ${{ hashFiles('trivy-config-results.sarif') != '' && 'vorhanden' || 'nicht erzeugt' }}" >> "$GITHUB_STEP_SUMMARY"

  trivy-container:
    name: Trivy Container Scan (API)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Build API container image for scanning
        id: build_api
        run: |
          docker build -t menschlichkeit-api:scan ./apps/api/ \
            --file ./apps/api/Dockerfile \
            --no-cache
        continue-on-error: true

      - name: Run Trivy container vulnerability scanner
        if: steps.build_api.outcome == 'success'
        id: trivy_container
        shell: bash
        run: |
          set +e
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/repo" \
            aquasec/trivy:latest \
            image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format sarif \
            --output /repo/trivy-container-results.sarif \
            --exit-code 0 \
            menschlichkeit-api:scan
          status=$?
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Container build summary
        if: always()
        run: |
          echo "## Trivy Container Scan" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.build_api.outcome }}" = "success" ]; then
            echo "- ✅ API-Container erfolgreich gebaut und gescannt" >> "$GITHUB_STEP_SUMMARY"
            echo "- Exit-Code: ${{ steps.trivy_container.outputs.exit_code || '0' }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- ⚠️ API-Container konnte nicht gebaut werden, Container-Scan wurde übersprungen" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Trivy container results to GitHub Security tab
        if: always() && hashFiles('trivy-container-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@45775bd8235c68ba998cffa5171334d58593da47  # v3.28.1
        with:
          sarif_file: trivy-container-results.sarif
          category: trivy-container

      - name: Upload container results as artifact
        if: always() && hashFiles('trivy-container-results.sarif') != ''
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        with:
          name: trivy-container-results
          path: trivy-container-results.sarif
          retention-days: 30
