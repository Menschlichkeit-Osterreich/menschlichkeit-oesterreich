name: Trivy Scans

on:
  push:
    branches: [main, develop, chore/**, feature/**]
  pull_request:
    branches: [main, develop]
  schedule:
    # Täglich 04:00 UTC
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: trivy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  trivy-fs:
    name: Trivy Filesystem & Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run Trivy vulnerability scanner (Filesystem)
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0  # 0.29.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          scanners: vuln,secret,config
          ignore-unfixed: true
          exit-code: 0

      - name: Upload Trivy FS results to GitHub Security tab
        if: always() && hashFiles('trivy-fs-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@b1bff81932f5cdfc8695c7752dcee935dcd061c8  # v3.28.1
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem

      - name: Upload FS results as artifact
        if: always() && hashFiles('trivy-fs-results.sarif') != ''
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        with:
          name: trivy-fs-results
          path: trivy-fs-results.sarif
          retention-days: 30

  trivy-config:
    name: Trivy Config (IaC/Misconfig)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run Trivy misconfiguration scanner
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0  # 0.29.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          scanners: config
          exit-code: 0

      - name: Upload Trivy Config results to GitHub Security tab
        if: always() && hashFiles('trivy-config-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@b1bff81932f5cdfc8695c7752dcee935dcd061c8  # v3.28.1
        with:
          sarif_file: trivy-config-results.sarif
          category: trivy-config

      - name: Upload Config results as artifact
        if: always() && hashFiles('trivy-config-results.sarif') != ''
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        with:
          name: trivy-config-results
          path: trivy-config-results.sarif
          retention-days: 30

  trivy-container:
    name: Trivy Container Scan (API)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Build API container image for scanning
        id: build_api
        run: |
          docker build -t menschlichkeit-api:scan ./apps/api/ \
            --file ./apps/api/Dockerfile \
            --no-cache
        continue-on-error: true

      - name: Run Trivy container vulnerability scanner
        if: steps.build_api.outcome == 'success'
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0  # 0.29.0
        with:
          scan-type: image
          image-ref: menschlichkeit-api:scan
          format: sarif
          output: trivy-container-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0

      - name: Container build summary
        if: always()
        run: |
          echo "## Trivy Container Scan" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.build_api.outcome }}" = "success" ]; then
            echo "- ✅ API-Container erfolgreich gebaut und gescannt" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- ⚠️ API-Container konnte nicht gebaut werden, Container-Scan wurde übersprungen" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Trivy container results to GitHub Security tab
        if: always() && hashFiles('trivy-container-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@b1bff81932f5cdfc8695c7752dcee935dcd061c8  # v3.28.1
        with:
          sarif_file: trivy-container-results.sarif
          category: trivy-container

      - name: Upload container results as artifact
        if: always() && hashFiles('trivy-container-results.sarif') != ''
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        with:
          name: trivy-container-results
          path: trivy-container-results.sarif
          retention-days: 30
