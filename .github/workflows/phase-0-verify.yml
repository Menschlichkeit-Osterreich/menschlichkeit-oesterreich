name: Phase 0 Verification

on:
  pull_request:
  push:
    branches: [main, develop, chore/**, feature/**]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  verify-phase-0:
    name: Phase 0 Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v4.2.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install OPA CLI (mit SHA-Verifikation)
        run: |
          set -euo pipefail
          OPA_VERSION="v0.63.0"
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64|amd64) OPA_ARCH="amd64";;
            aarch64|arm64) OPA_ARCH="arm64";;
            *) OPA_ARCH="amd64";;
          esac
          OPA_URL="https://openpolicyagent.org/downloads/${OPA_VERSION}/opa_linux_${OPA_ARCH}"
          OPA_SHA_URL="https://openpolicyagent.org/downloads/${OPA_VERSION}/opa_linux_${OPA_ARCH}.sha256"

          # SHA-256 Verifikation: Checksum-Datei vor Binary herunterladen
          curl -fsSL "$OPA_SHA_URL" -o /tmp/opa.sha256
          curl -fsSL "$OPA_URL" -o /tmp/opa
          # sha256sum prüfen (Format: <hash>  <filename>)
          cd /tmp && sed -i "s|opa_linux_${OPA_ARCH}|opa|g" /tmp/opa.sha256 && sha256sum -c /tmp/opa.sha256
          install -m 0755 /tmp/opa /usr/local/bin/opa
          opa version || true

      - name: Run Phase 0 verification
        run: bash analysis/phase-0/verification/verify-phase-0.sh

      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        with:
          name: phase-0-verification-report
          path: analysis/phase-0/verification/phase-0-verification-report.md
          if-no-files-found: warn

      - name: Append report to summary
        if: always()
        run: |
          if [ -f analysis/phase-0/verification/phase-0-verification-report.md ]; then
            echo "## Phase 0 Verification Report" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat analysis/phase-0/verification/phase-0-verification-report.md >> "$GITHUB_STEP_SUMMARY"
          fi
