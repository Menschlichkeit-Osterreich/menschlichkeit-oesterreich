name: Validate .github metadata

on:
  push:
    paths:
      - '.github/**'
      - 'scripts/validate-github-files.py'
      - 'scripts/normalize-frontmatter.py'
  pull_request:
    paths:
      - '.github/**'
      - 'scripts/validate-github-files.py'
      - 'scripts/normalize-frontmatter.py'

permissions:
  contents: read  # Required for GITHUB_TOKEN to access /repos API endpoint

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.11'

      - name: Validate .github files
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/validate-github-files.py | tee validation.log

      - name: Upload validation log
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        with:
          name: github-metadata-validation-log
          path: validation.log
