name: Deploy to Plesk (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      service:
        description: "Welcher Service soll deployt werden?"
        required: true
        type: choice
        default: all
        options:
          - all
          - frontend
          - api
          - crm
          - games

permissions:
  contents: read

# Kein paralleles Deployment auf denselben Branch
concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: false

env:
  SSH_HOST: ${{ secrets.PLESK_HOST }}
  SSH_PORT: ${{ secrets.PLESK_PORT || '22' }}
  SSH_USER: ${{ secrets.PLESK_USER }}
  BASE_PATH: ${{ vars.PLESK_BASE_PATH || '/var/www/vhosts/menschlichkeit-oesterreich.at/httpdocs' }}
  MAIN_DOMAIN: ${{ vars.MAIN_DOMAIN || 'menschlichkeit-oesterreich.at' }}

jobs:
  # ============================================================
  # BUILD — Frontend (React + Vite)
  # ============================================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.service == 'all' || github.event.inputs.service == 'frontend' || github.event_name == 'push' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Dependencies installieren
        run: npm ci

      - name: Frontend bauen
        run: npm run build:frontend
        env:
          NODE_ENV: ${{ vars.NODE_ENV || 'production' }}
          VITE_APP_URL: ${{ vars.APP_URL || 'https://menschlichkeit-oesterreich.at' }}

      - name: Build-Artefakt speichern
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/website/dist/
          retention-days: 1

  # ============================================================
  # TEST — Unit Tests (blockierendes Gate)
  # ============================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Dependencies installieren
        run: npm ci

      - name: Unit Tests ausführen
        run: npm run test:unit

  # ============================================================
  # DEPLOY — rsync + Remote-Kommandos
  # ============================================================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build-frontend, test]
    environment: production
    # Falls nur API oder CRM deployt wird, entfällt build-frontend — hier überspringen wir needs
    # via if-Bedingung (build-frontend läuft nur bei all/frontend)
    if: always() && needs.test.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- SSH einrichten ----
      - name: SSH-Agent starten
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PLESK_SSH_PRIVATE_KEY }}

      - name: Known Hosts eintragen (kein ssh-keyscan in Produktion)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PLESK_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      # ---- Frontend deployen ----
      - name: Frontend-Artefakt herunterladen
        if: ${{ github.event.inputs.service == 'all' || github.event.inputs.service == 'frontend' || github.event_name == 'push' }}
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: _dist_frontend/

      - name: Frontend → rsync zum Server
        if: ${{ github.event.inputs.service == 'all' || github.event.inputs.service == 'frontend' || github.event_name == 'push' }}
        run: |
          rsync -az --delete --partial \
            --exclude=".git" \
            -e "ssh -p ${{ env.SSH_PORT }}" \
            _dist_frontend/ \
            "${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${{ env.BASE_PATH }}/"

      # ---- API deployen ----
      - name: API → rsync zum Server
        if: ${{ github.event.inputs.service == 'all' || github.event.inputs.service == 'api' || github.event_name == 'push' }}
        run: |
          rsync -az --delete --partial \
            --exclude=".git" \
            --exclude="__pycache__" \
            --exclude="*.pyc" \
            --exclude=".venv" \
            --exclude="venv" \
            --exclude=".env" \
            -e "ssh -p ${{ env.SSH_PORT }}" \
            apps/api/ \
            "${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${{ env.BASE_PATH }}/../subdomains/api/httpdocs/"

      - name: API → pip install auf Server
        if: ${{ github.event.inputs.service == 'all' || github.event.inputs.service == 'api' || github.event_name == 'push' }}
        run: |
          ssh -p "${{ env.SSH_PORT }}" "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" \
            "cd '${{ env.BASE_PATH }}/../subdomains/api/httpdocs' && \
             pip3 install -r requirements.txt --quiet --no-warn-script-location"

      # ---- CRM deployen ----
      - name: CRM → rsync zum Server
        if: ${{ github.event.inputs.service == 'all' || github.event.inputs.service == 'crm' || github.event_name == 'push' }}
        run: |
          rsync -az --delete --partial \
            --exclude=".git" \
            --exclude="node_modules" \
            --exclude="vendor" \
            --exclude="web/sites/*/files" \
            --exclude=".env" \
            -e "ssh -p ${{ env.SSH_PORT }}" \
            apps/crm/ \
            "${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${{ env.BASE_PATH }}/../subdomains/crm/httpdocs/"

      - name: CRM → composer install auf Server
        if: ${{ github.event.inputs.service == 'all' || github.event.inputs.service == 'crm' || github.event_name == 'push' }}
        run: |
          ssh -p "${{ env.SSH_PORT }}" "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" \
            "cd '${{ env.BASE_PATH }}/../subdomains/crm/httpdocs' && \
             composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction"

      - name: CRM → Drupal-Updates & Cache leeren
        if: ${{ github.event.inputs.service == 'all' || github.event.inputs.service == 'crm' || github.event_name == 'push' }}
        run: |
          ssh -p "${{ env.SSH_PORT }}" "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" \
            "cd '${{ env.BASE_PATH }}/../subdomains/crm/httpdocs' && \
             vendor/bin/drush updb -y && \
             vendor/bin/drush cr"

      # ---- Games deployen (statisch, kein Build) ----
      - name: Games → rsync zum Server
        if: ${{ github.event.inputs.service == 'all' || github.event.inputs.service == 'games' || github.event_name == 'push' }}
        run: |
          rsync -az --delete --partial \
            --exclude=".git" \
            --exclude="node_modules" \
            --exclude=".env" \
            -e "ssh -p ${{ env.SSH_PORT }}" \
            apps/game/ \
            "${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${{ env.BASE_PATH }}/../subdomains/games/httpdocs/"

      # ============================================================
      # HEALTHCHECK — alle Services
      # ============================================================
      - name: Healthcheck — Frontend
        if: ${{ github.event.inputs.service == 'all' || github.event.inputs.service == 'frontend' || github.event_name == 'push' }}
        run: |
          sleep 5
          curl --fail --silent --max-time 15 \
            "https://${{ env.MAIN_DOMAIN }}/" \
            -o /dev/null \
            -w "Frontend HTTP Status: %{http_code}\n"

      - name: Healthcheck — API
        if: ${{ github.event.inputs.service == 'all' || github.event.inputs.service == 'api' || github.event_name == 'push' }}
        run: |
          curl --fail --silent --max-time 15 \
            "https://api.${{ env.MAIN_DOMAIN }}/health" \
            -o /dev/null \
            -w "API HTTP Status: %{http_code}\n"

      - name: Healthcheck — CRM
        if: ${{ github.event.inputs.service == 'all' || github.event.inputs.service == 'crm' || github.event_name == 'push' }}
        run: |
          curl --fail --silent --max-time 20 \
            "https://crm.${{ env.MAIN_DOMAIN }}/" \
            -o /dev/null \
            -w "CRM HTTP Status: %{http_code}\n"

      - name: Healthcheck — Games
        if: ${{ github.event.inputs.service == 'all' || github.event.inputs.service == 'games' || github.event_name == 'push' }}
        run: |
          curl --fail --silent --max-time 15 \
            "https://games.${{ env.MAIN_DOMAIN }}/" \
            -o /dev/null \
            -w "Games HTTP Status: %{http_code}\n"

      # ============================================================
      # DEPLOYMENT-ZUSAMMENFASSUNG
      # ============================================================
      - name: Deployment-Zusammenfassung
        if: always()
        run: |
          echo "## Deployment abgeschlossen" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | https://${{ env.MAIN_DOMAIN }}/ |" >> $GITHUB_STEP_SUMMARY
          echo "| API | https://api.${{ env.MAIN_DOMAIN }}/ |" >> $GITHUB_STEP_SUMMARY
          echo "| CRM | https://crm.${{ env.MAIN_DOMAIN }}/ |" >> $GITHUB_STEP_SUMMARY
          echo "| Games | https://games.${{ env.MAIN_DOMAIN }}/ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
