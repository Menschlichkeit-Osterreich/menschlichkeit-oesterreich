name: Deploy to Plesk (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      service:
        description: 'Service deployen'
        required: true
        type: choice
        default: all
        options:
          - all
          - frontend
          - api
          - crm
          - games
      dry_run:
        description: 'Dry-Run (kein echtes Deployment)'
        required: false
        type: boolean
        default: false
      normalize_test_case:
        description: 'Testfall fuer Remote-Path-Normalisierung (nur zum Verifizieren)'
        required: false
        type: choice
        default: none
        options:
          - none
          - single-leading-slash
          - multi-leading-slash
          - empty

permissions:
  contents: read

# Temporär: run_id hinzugefügt, um GitHub Actions Concurrency-Deadlock zu umgehen
# Dieser Block wird nach erfolgreichem Deployment wiederhergestellt
concurrency:
  group: deploy-production-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

env:
  BASE_PATH: ${{ vars.PLESK_BASE_PATH || '/var/www/vhosts/menschlichkeit-oesterreich.at/httpdocs' }}
  FRONTEND_REMOTE_PATH: ${{ vars.PLESK_FRONTEND_PATH || 'httpdocs' }}
  API_REMOTE_PATH: ${{ vars.PLESK_API_PATH || 'subdomains/api/httpdocs' }}
  CRM_REMOTE_PATH: ${{ vars.PLESK_CRM_PATH || 'subdomains/crm/httpdocs' }}
  CRM_NATIVE_REMOTE_PATH: ${{ vars.PLESK_CRM_NATIVE_PATH || 'subdomains/crm/httpdocs/native' }}
  CRM_NATIVE_BUILD_PATH: ${{ vars.PLESK_CRM_NATIVE_BUILD_PATH || 'subdomains/crm/httpdocs/.native-build' }}
  GAMES_REMOTE_PATH: ${{ vars.PLESK_GAMES_PATH || 'subdomains/games/httpdocs' }}
  MAIN_DOMAIN: ${{ vars.MAIN_DOMAIN || 'menschlichkeit-oesterreich.at' }}
  NODE_VERSION: '22'
  LIVE_NOTIFICATION_PROBE: ${{ vars.LIVE_NOTIFICATION_PROBE || 'false' }}
  TARGET_SERVICE: ${{ github.event_name == 'push' && 'all' || github.event.inputs.service || 'all' }}

jobs:
  # ============================================================
  # BSM — Bitwarden Secrets Manager Injection (optional)
  # ============================================================
  bsm-secrets:
    name: 'BSM: Production Secrets laden'
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.normalize_test_case == 'none' }}
    uses: ./.github/workflows/reusable-bsm-secrets.yml
    with:
      profile: deploy-production
    secrets:
      BW_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}

  # ============================================================
  # VALIDATE — Env-Vars, Branch-Schutz, Dry-Run-Banner
  # ============================================================
  validate:
    name: Validierung & Branch-Schutz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Branch-Schutz prüfen
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          echo "Branch: ${BRANCH}"
          if [[ "${BRANCH}" != "main" && "${{ github.event_name }}" != "workflow_dispatch" ]]; then
            echo "✗ Deployment nur von 'main' erlaubt. Abgebrochen."
            exit 1
          fi
          echo "✓ Branch-Check OK: ${BRANCH}"

      - name: Dry-Run-Info
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
        run: echo "⚠️ DRY-RUN AKTIV — kein Schreiben auf Produktion."

      - name: Pflicht-Secrets prüfen
        env:
          HAS_BW_TOKEN: ${{ secrets.BW_ACCESS_TOKEN != '' }}
        run: |
          ERRORS=0
          [[ "${HAS_BW_TOKEN}" == "true" ]] && echo "✓ BW_ACCESS_TOKEN" || { echo "✗ BW_ACCESS_TOKEN fehlt"; ERRORS=$((ERRORS+1)); }
          if (( ERRORS > 0 )); then
            echo "✗ ${ERRORS} Pflicht-Secret(s) fehlen. Deployment abgebrochen."
            exit 1
          fi
          echo "✓ Pflicht-Secret fuer BSM vorhanden."

  # ============================================================
  # BUILD — Frontend (React + Vite)
  # ============================================================
  build-frontend:
    name: Frontend bauen (Vite)
    runs-on: ubuntu-latest
    needs: [validate]
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.normalize_test_case == 'none' }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Node.js ${{ env.NODE_VERSION }} einrichten
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/website/package-lock.json

      - name: Dependencies installieren
        working-directory: apps/website
        run: npm ci --prefer-offline --ignore-scripts

      - name: TypeScript-Check
        working-directory: apps/website
        run: npm run type-check

      - name: Frontend bauen
        working-directory: apps/website
        run: npm run build:prerender
        env:
          NODE_ENV: production
          VITE_APP_URL: 'https://${{ env.MAIN_DOMAIN }}'
          VITE_API_URL: 'https://api.${{ env.MAIN_DOMAIN }}'

      - name: Public Route Smokes + Pa11y
        working-directory: apps/website
        run: |
          npm run a11y:preview > /tmp/moe-website-preview.log 2>&1 &
          PREVIEW_PID=$!
          trap 'kill ${PREVIEW_PID}' EXIT
          npx wait-on http://127.0.0.1:4173
          npm run route:smoke
          npm run a11y:test

      - name: Build-Größe ausgeben
        working-directory: apps/website
        run: du -sh dist/ && find dist/ -name "*.js" | head -5

      - name: Build-Artefakt speichern
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: frontend-dist-${{ github.sha }}
          path: apps/website/dist/
          retention-days: 3

  # ============================================================
  # BUILD — Games (Babylon.js static runtime)
  # ============================================================
  build-games:
    name: Games bauen (Babylon.js)
    runs-on: ubuntu-latest
    needs: [validate]
    if: >-
      (github.event_name != 'workflow_dispatch' || github.event.inputs.normalize_test_case == 'none') &&
      (github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' &&
          (github.event.inputs.service == 'all' || github.event.inputs.service == 'games')))
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Node.js ${{ env.NODE_VERSION }} einrichten
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Games-Dependencies installieren
        working-directory: apps/babylon-game
        run: npm ci --prefer-offline --ignore-scripts

      - name: Games-Build schreiben
        working-directory: apps/babylon-game
        run: npm run build

      - name: Games-Artefakt speichern
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: games-dist-${{ github.sha }}
          path: |
            apps/babylon-game/.next/
            apps/babylon-game/public/
            apps/babylon-game/package.json
            apps/babylon-game/next.config.ts
          retention-days: 3

  # ============================================================
  # TEST — Unit Tests
  # ============================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [validate]
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.normalize_test_case == 'none' }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Node.js einrichten
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/website/package-lock.json

      - name: Dependencies installieren
        working-directory: apps/website
        run: npm ci --prefer-offline --ignore-scripts

      - name: Unit Tests ausführen
        working-directory: apps/website
        run: npm run test:unit -- --run

  # ============================================================
  # PREFLIGHT — BSM Handoff prüfen (auch im Dry-Run)
  # ============================================================
  preflight:
    name: Preflight (BSM Handoff)
    runs-on: ubuntu-latest
    needs: [bsm-secrets, validate]
    if: >-
      (github.event_name != 'workflow_dispatch' || github.event.inputs.normalize_test_case == 'none') &&
      (github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.service == 'all' || github.event.inputs.service == 'api')))
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: BSM-Secrets in Job-Umgebung laden
        uses: ./.github/actions/bsm-env-inject
        with:
          profile: deploy-production
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}

      - name: Preflight → BSM Secret Validation
        run: |
          set -euo pipefail
          echo "=== Preflight: BSM Secret Validation ==="
          ERRORS=0

          required_keys=(
            PLESK_HOST
            PLESK_USER
            PLESK_PORT
            PLESK_SSH_PRIVATE_KEY
            PLESK_KNOWN_HOSTS
            DATABASE_URL
            JWT_SECRET_KEY
            STRIPE_SECRET_KEY
            STRIPE_WEBHOOK_SECRET
            MOE_API_TOKEN
            N8N_WEBHOOK_SECRET
            CIVICRM_SITE_KEY
            CIVICRM_API_KEY
            ALERTS_SLACK_WEBHOOK
            MICROSOFT_TENANT_ID
            MICROSOFT_CLIENT_ID
            MICROSOFT_CLIENT_SECRET
            MICROSOFT_GRAPH_SENDER
          )

          for key in "${required_keys[@]}"; do
            value="${!key:-}"
            if [ -n "$value" ]; then
              echo "✓ ${key}"
            else
              echo "✗ ${key} fehlt"
              ERRORS=$((ERRORS+1))
            fi
          done

          if [ "${ERRORS}" -gt 0 ]; then
            echo "✗ ${ERRORS} BSM-Secret(s) fehlen. Deployment abgebrochen."
            exit 1
          fi
          echo "✓ Alle BSM-Secrets vorhanden."

  # ============================================================
  # NORMALIZE VERIFICATION — strikter Testmodus ohne Deploy
  # ============================================================
  normalize-verification:
    name: Normalize Verification (No Deploy)
    runs-on: ubuntu-latest
    needs: [validate]
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.normalize_test_case != 'none' }}

    steps:
      - name: Normalize-Step Testfall injizieren (workflow_dispatch)
        run: |
          set -euo pipefail
          case "${{ github.event.inputs.normalize_test_case }}" in
            single-leading-slash)
              echo "FRONTEND_REMOTE_PATH=/httpdocs" >> "$GITHUB_ENV"
              echo "🧪 Testfall aktiv: FRONTEND_REMOTE_PATH=/httpdocs"
              ;;
            multi-leading-slash)
              echo "FRONTEND_REMOTE_PATH=////httpdocs" >> "$GITHUB_ENV"
              echo "🧪 Testfall aktiv: FRONTEND_REMOTE_PATH=////httpdocs"
              ;;
            empty)
              echo "FRONTEND_REMOTE_PATH=" >> "$GITHUB_ENV"
              echo "🧪 Testfall aktiv: FRONTEND_REMOTE_PATH=<leer>"
              ;;
            *)
              echo "Unbekannter normalize_test_case: ${{ github.event.inputs.normalize_test_case }}"
              exit 1
              ;;
          esac

      - name: Normalize Remote Paths verifizieren (ohne Deploy)
        run: |
          echo "🔍 Verifiziere Remote-Pfad-Normalisierung im Testmodus..."
          set -euo pipefail

          normalize_path() {
            local var_name=$1
            local var_value=$2
            local original_value=$2

            if [[ -z "$var_value" ]]; then
              echo "✗ FEHLER: $var_name ist leer (vor Normalisierung)."
              exit 1
            fi

            if [[ "$var_value" == /* ]]; then
              echo "⚠️  WARNUNG: $var_name hatte führenden Slash: $var_value"
              while [[ "$var_value" == /* ]]; do
                var_value="${var_value#/}"
              done
              echo "   Normalisiert zu: $var_value"
            fi

            if [[ -z "$var_value" ]]; then
              echo "✗ FEHLER: $var_name ist nach Normalisierung leer (Original: '$original_value')."
              exit 1
            fi

            echo "  ✓ $var_name = $var_value"
          }

          echo "── Verarbeite alle 6 Remote-Path-Variablen ──"
          normalize_path "FRONTEND_REMOTE_PATH" "${FRONTEND_REMOTE_PATH:-}"
          normalize_path "API_REMOTE_PATH" "${{ env.API_REMOTE_PATH }}"
          normalize_path "CRM_REMOTE_PATH" "${{ env.CRM_REMOTE_PATH }}"
          normalize_path "CRM_NATIVE_REMOTE_PATH" "${{ env.CRM_NATIVE_REMOTE_PATH }}"
          normalize_path "CRM_NATIVE_BUILD_PATH" "${{ env.CRM_NATIVE_BUILD_PATH }}"
          normalize_path "GAMES_REMOTE_PATH" "${{ env.GAMES_REMOTE_PATH }}"

          echo "✅ Testmodus abgeschlossen: keine SSH/SCP/Deploy-Schritte wurden ausgeführt."

  # ============================================================
  # DEPLOY — rsync + Remote-Kommandos
  # ============================================================
  deploy:
    name: Deploy → Plesk
    runs-on: ubuntu-latest
    needs: [bsm-secrets, preflight, build-frontend, build-games, test]
    environment: production
    if: >-
      (github.event_name != 'workflow_dispatch' || github.event.inputs.normalize_test_case == 'none') &&
      (github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' &&
          github.event.inputs.dry_run != 'true')) &&
      needs.build-frontend.result == 'success' &&
      (needs.build-games.result == 'success' || needs.build-games.result == 'skipped') &&
      needs.test.result == 'success' &&
      needs.preflight.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: BSM-Secrets in Job-Umgebung laden
        uses: ./.github/actions/bsm-env-inject
        with:
          profile: deploy-production
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}

      - name: API Evidence Status initialisieren (redigiert)
        if: >
          env.TARGET_SERVICE == 'all' ||
          env.TARGET_SERVICE == 'api'
        run: |
          {
            echo "API_HANDOFF_CONTRACT_STATUS=not-run"
            echo "API_SECRET_RUNTIME_STATUS=not-run"
            echo "API_GRAPH_CHANNEL_CONFIG_STATUS=unknown"
            echo "API_SLACK_CHANNEL_CONFIG_STATUS=unknown"
            echo "API_GRAPH_CHANNEL_PROBE_STATUS=not-run"
            echo "API_SLACK_CHANNEL_PROBE_STATUS=not-run"
            echo "API_NOTIFICATION_PROBE_STATUS=not-run"
            echo "API_NOTIFICATION_PROBE_BREAKPOINT=none"
            echo "API_EVIDENCE_BREAKPOINT=none"
            echo "API_OPEN_EVIDENCE_GAP=none"
          } >> "$GITHUB_ENV"

      - name: Plesk-Infra-Kontext aus BSM aufloesen (fail-fast)
        run: |
          set -euo pipefail
          placeholder_re='^(CHANGE_ME|PLACEHOLDER|UPDATE_VALUE_IN_VAULT|YOUR_|REPLACE_|TODO)'

          fail() {
            echo "✗ $1"
            exit 1
          }

          has_placeholder_prefix() {
            local value=$1
            [[ "$value" =~ $placeholder_re ]]
          }

          [ -n "${PLESK_HOST:-}" ] || fail "PLESK_HOST fehlt in BSM-Injection"
          ! has_placeholder_prefix "${PLESK_HOST}" || fail "PLESK_HOST enthaelt einen Platzhalterwert"
          echo "✓ PLESK_HOST"

          [ -n "${PLESK_USER:-}" ] || fail "PLESK_USER fehlt in BSM-Injection"
          ! has_placeholder_prefix "${PLESK_USER}" || fail "PLESK_USER enthaelt einen Platzhalterwert"
          [[ "${PLESK_USER}" =~ ^[A-Za-z0-9_][A-Za-z0-9._-]{0,63}$ ]] || fail "PLESK_USER hat ein ungueltiges Format"
          echo "✓ PLESK_USER"

          [ -n "${PLESK_PORT:-}" ] || fail "PLESK_PORT fehlt in BSM-Injection"
          ! has_placeholder_prefix "${PLESK_PORT}" || fail "PLESK_PORT enthaelt einen Platzhalterwert"
          [[ "${PLESK_PORT}" =~ ^[0-9]+$ ]] || fail "PLESK_PORT ist nicht numerisch"
          if (( 10#${PLESK_PORT} < 1 || 10#${PLESK_PORT} > 65535 )); then
            fail "PLESK_PORT liegt ausserhalb des erlaubten Bereichs 1..65535"
          fi
          echo "✓ PLESK_PORT"

          [ -n "${PLESK_SSH_PRIVATE_KEY:-}" ] || fail "PLESK_SSH_PRIVATE_KEY fehlt in BSM-Injection"
          if grep -Eq '(CHANGE_ME|PLACEHOLDER|UPDATE_VALUE_IN_VAULT|YOUR_|REPLACE_|TODO)' <<< "${PLESK_SSH_PRIVATE_KEY}"; then
            fail "PLESK_SSH_PRIVATE_KEY enthaelt einen Platzhalterwert"
          fi
          echo "✓ PLESK_SSH_PRIVATE_KEY"

          [ -n "${PLESK_KNOWN_HOSTS:-}" ] || fail "PLESK_KNOWN_HOSTS fehlt in BSM-Injection"
          ! has_placeholder_prefix "${PLESK_KNOWN_HOSTS}" || fail "PLESK_KNOWN_HOSTS enthaelt einen Platzhalterwert"
          if [[ "${PLESK_KNOWN_HOSTS}" == *$'\n'* || "${PLESK_KNOWN_HOSTS}" == *$'\r'* ]]; then
            fail "PLESK_KNOWN_HOSTS muss genau eine OpenSSH-known_hosts-Zeile enthalten"
          fi
          if ! [[ "${PLESK_KNOWN_HOSTS}" =~ ^[^[:space:]]+[[:space:]]+(ssh-ed25519|ecdsa-sha2-nistp256)[[:space:]]+[A-Za-z0-9+/=]+$ ]]; then
            fail "PLESK_KNOWN_HOSTS hat kein vollstaendiges OpenSSH-known_hosts-Format"
          fi
          echo "✓ PLESK_KNOWN_HOSTS"

      - name: Node.js ${{ env.NODE_VERSION }} einrichten
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ── SSH einrichten ──────────────────────────────────────
      - name: SSH-Agent starten
        run: |
          set -euo pipefail
          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=${SSH_AUTH_SOCK}" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=${SSH_AGENT_PID}" >> "$GITHUB_ENV"
          echo "${PLESK_SSH_PRIVATE_KEY}" | tr -d '\r' | ssh-add -

      - name: known_hosts aus Secret eintragen
        run: |
          mkdir -p ~/.ssh
          # Niemals ssh-keyscan in Produktion ohne Verifikation!
          printf '%s\n' "${PLESK_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          echo "✓ known_hosts gesetzt."

      - name: SSH-Config schreiben
        run: |
          set -euo pipefail
          RESOLVED_PLESK_HOST="${PLESK_HOST}"
          RESOLVED_PLESK_PORT="${PLESK_PORT}"
          RESOLVED_PLESK_USER="${PLESK_USER}"
          cat >> ~/.ssh/config <<EOF
          Host plesk-prod
            HostName ${RESOLVED_PLESK_HOST}
            Port ${RESOLVED_PLESK_PORT}
            User ${RESOLVED_PLESK_USER}
            StrictHostKeyChecking yes
            BatchMode yes
            ConnectTimeout 15
          EOF
          chmod 600 ~/.ssh/config
          echo "✓ SSH-Config gesetzt."

      - name: Normalize Remote Paths für Plesk Chroot
        run: |
          echo "🔍 Validiere und normalisiere Remote-Pfade für Plesk Chroot..."
          set -euo pipefail

          normalize_path() {
            local var_name=$1
            local var_value=$2
            local original_value=$2

            if [[ -z "$var_value" ]]; then
              echo "✗ FEHLER: $var_name ist leer (vor Normalisierung)."
              exit 1
            fi

            if [[ "$var_value" == /* ]]; then
              echo "⚠️  WARNUNG: $var_name hatte führenden Slash: $var_value"
              while [[ "$var_value" == /* ]]; do
                var_value="${var_value#/}"
              done
              echo "   Normalisiert zu: $var_value"
            fi

            if [[ -z "$var_value" ]]; then
              echo "✗ FEHLER: $var_name ist nach Normalisierung leer (Original: '$original_value')."
              exit 1
            fi

            echo "$var_name=$var_value" >> "$GITHUB_ENV"
            echo "  ✓ $var_name = $var_value"
          }

          echo "── Verarbeite alle 6 Remote-Path-Variablen ──"
          normalize_path "FRONTEND_REMOTE_PATH" "${{ env.FRONTEND_REMOTE_PATH }}"
          normalize_path "API_REMOTE_PATH" "${{ env.API_REMOTE_PATH }}"
          normalize_path "CRM_REMOTE_PATH" "${{ env.CRM_REMOTE_PATH }}"
          normalize_path "CRM_NATIVE_REMOTE_PATH" "${{ env.CRM_NATIVE_REMOTE_PATH }}"
          normalize_path "CRM_NATIVE_BUILD_PATH" "${{ env.CRM_NATIVE_BUILD_PATH }}"
          normalize_path "GAMES_REMOTE_PATH" "${{ env.GAMES_REMOTE_PATH }}"

          echo "✅ Pfad-Normalisierung abgeschlossen."
          echo "Alle nachfolgenden scp/ssh-Steps werden normalisierte Pfade verwenden."

      - name: SSH-Verbindung testen + Chroot erkunden
        id: chroot
        run: |
          ssh plesk-prod "echo 'SSH OK: $(hostname)'"
          echo "=== Chroot Home-Struktur ==="
          HOME_STRUCT=$(ssh plesk-prod "pwd && ls -la && ls -la httpdocs/ 2>/dev/null || echo 'kein httpdocs'" 2>&1)
          echo "$HOME_STRUCT"
          # DEPLOY_ROOT ermitteln: ~ oder ~/subdomains/
          HAS_HTTPDOCS=$(ssh plesk-prod "[ -d httpdocs ] && echo yes || echo no")
          echo "deploy_root=${HAS_HTTPDOCS}" >> "$GITHUB_OUTPUT"
          echo "home_path=$(ssh plesk-prod pwd)" >> "$GITHUB_OUTPUT"

      # ── Release-Metadaten ───────────────────────────────────
      - name: Release-Metadaten vorbereiten
        id: release
        run: |
          TS=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          echo "timestamp=${TS}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          echo "marker=service=${{ env.TARGET_SERVICE }} commit=${GITHUB_SHA::8} timestamp=${TS} actor=${GITHUB_ACTOR}" >> "$GITHUB_OUTPUT"

      # ── Frontend deployen ───────────────────────────────────
      - name: Frontend-Artefakt herunterladen
        if: >
          env.TARGET_SERVICE == 'all' ||
          env.TARGET_SERVICE == 'frontend'
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: frontend-dist-${{ github.sha }}
          path: _dist_website/

      - name: Frontend Preflight (Chroot-SSH + Zielpfad)
        if: >
          env.TARGET_SERVICE == 'all' ||
          env.TARGET_SERVICE == 'frontend'
        run: |
          set -euo pipefail
          TARGET_PATH='${{ env.FRONTEND_REMOTE_PATH }}'

          echo "[PRECHECK][SSH] Verbindung testen"
          ssh plesk-prod "true"

          echo "[PRECHECK][PATH] Zielpfad vorbereiten: ${TARGET_PATH}"
          ssh plesk-prod "mkdir -p '${TARGET_PATH}'"
          ssh plesk-prod "[ -d '${TARGET_PATH}' ]"

          echo "[PRECHECK][PERM] Schreibbarkeit pruefen: ${TARGET_PATH}"
          TEST_FILE="${TARGET_PATH}/.preflight-write-test-${GITHUB_RUN_ID}"
          ssh plesk-prod "printf '%s\n' preflight > '${TEST_FILE}'"
          ssh plesk-prod "rm -f '${TEST_FILE}'"

          echo "✓ Frontend Preflight erfolgreich."

      - name: Frontend → scp (Chroot-SSH)
        if: >
          env.TARGET_SERVICE == 'all' ||
          env.TARGET_SERVICE == 'frontend'
        run: |
          set -euo pipefail
          # Chroot-SSH: Pfade relativ zum Home-Verzeichnis des Chroot-Users
          find _dist_website -name "*.map" -delete
          ssh plesk-prod "mkdir -p '${{ env.FRONTEND_REMOTE_PATH }}'"
          scp -r -F ~/.ssh/config \
            _dist_website/. \
            "plesk-prod:${{ env.FRONTEND_REMOTE_PATH }}/"
          ssh plesk-prod \
            "printf '%s\n' '${{ steps.release.outputs.marker }}' > '${{ env.FRONTEND_REMOTE_PATH }}/.deploy_release'"
          echo "✓ Frontend deployt."

      # ── API deployen ────────────────────────────────────────
      # ── Preflight: Microsoft Graph + Slack Secrets validieren ────────────
      - name: Preflight → BSM Secret Validation
        if: >
          env.TARGET_SERVICE == 'all' ||
          env.TARGET_SERVICE == 'api'
        run: |
          set -euo pipefail
          echo "=== API Preflight: Runtime-Secrets ==="
          ERRORS=0
          placeholder_re='^(CHANGE_ME|PLACEHOLDER|UPDATE_VALUE_IN_VAULT|YOUR_|REPLACE_|TODO)'

          required_keys=(
            DATABASE_URL
            JWT_SECRET_KEY
            STRIPE_SECRET_KEY
            STRIPE_WEBHOOK_SECRET
            MOE_API_TOKEN
            N8N_WEBHOOK_SECRET
            CIVICRM_SITE_KEY
            CIVICRM_API_KEY
            ALERTS_SLACK_WEBHOOK
            MICROSOFT_TENANT_ID
            MICROSOFT_CLIENT_ID
            MICROSOFT_CLIENT_SECRET
            MICROSOFT_GRAPH_SENDER
          )

          for key in "${required_keys[@]}"; do
            value="${!key:-}"
            if [ -z "$value" ]; then
              echo "✗ ${key} fehlt"
              ERRORS=$((ERRORS+1))
              continue
            fi
            if [[ "$value" =~ $placeholder_re ]]; then
              echo "✗ ${key} enthaelt einen Platzhalterwert"
              ERRORS=$((ERRORS+1))
              continue
            fi
            echo "✓ ${key}"
          done

          if [ "${ERRORS}" -gt 0 ]; then
            echo "✗ ${ERRORS} BSM-Secret(s) fehlen. Deployment abgebrochen."
            exit 1
          fi
          echo "✓ Alle BSM-Secrets vorhanden."

      - name: API → scp (Chroot-SSH)
        if: >
          env.TARGET_SERVICE == 'all' ||
          env.TARGET_SERVICE == 'api'
        run: |
          set -euo pipefail
          echo "=== API Deploy: Vollständiger Secret-Handoff aus aktueller Job-Umgebung ==="

          {
            printf 'MAIL_TRANSPORT=%s\n' "graph"
            printf 'DATABASE_URL=%s\n' "${DATABASE_URL}"
            printf 'JWT_SECRET_KEY=%s\n' "${JWT_SECRET_KEY}"
            printf 'STRIPE_SECRET_KEY=%s\n' "${STRIPE_SECRET_KEY}"
            printf 'STRIPE_WEBHOOK_SECRET=%s\n' "${STRIPE_WEBHOOK_SECRET}"
            printf 'MOE_API_TOKEN=%s\n' "${MOE_API_TOKEN}"
            printf 'N8N_WEBHOOK_SECRET=%s\n' "${N8N_WEBHOOK_SECRET}"
            printf 'CIVICRM_SITE_KEY=%s\n' "${CIVICRM_SITE_KEY}"
            printf 'CIVICRM_API_KEY=%s\n' "${CIVICRM_API_KEY}"
            printf 'MICROSOFT_TENANT_ID=%s\n' "${MICROSOFT_TENANT_ID}"
            printf 'MICROSOFT_CLIENT_ID=%s\n' "${MICROSOFT_CLIENT_ID}"
            printf 'MICROSOFT_CLIENT_SECRET=%s\n' "${MICROSOFT_CLIENT_SECRET}"
            printf 'MICROSOFT_GRAPH_SENDER=%s\n' "${MICROSOFT_GRAPH_SENDER}"
            printf 'ALERTS_SLACK_WEBHOOK=%s\n' "${ALERTS_SLACK_WEBHOOK}"
          } > /tmp/api-runtime.env

          echo "=== Verifiziere Secret-Handoff-Artefakt (.env.deploy) ==="
          required_keys=(
            MAIL_TRANSPORT
            DATABASE_URL
            JWT_SECRET_KEY
            STRIPE_SECRET_KEY
            STRIPE_WEBHOOK_SECRET
            MOE_API_TOKEN
            N8N_WEBHOOK_SECRET
            CIVICRM_SITE_KEY
            CIVICRM_API_KEY
            MICROSOFT_TENANT_ID
            MICROSOFT_CLIENT_ID
            MICROSOFT_CLIENT_SECRET
            MICROSOFT_GRAPH_SENDER
            ALERTS_SLACK_WEBHOOK
          )
          expected_key_count="${#required_keys[@]}"
          actual_key_count=$(grep -Ec '^[A-Z0-9_]+=' /tmp/api-runtime.env || true)
          if [ "${actual_key_count}" -ne "${expected_key_count}" ]; then
            echo "API_HANDOFF_CONTRACT_STATUS=failed" >> "$GITHUB_ENV"
            echo "API_EVIDENCE_BREAKPOINT=handoff_local_key_count_mismatch" >> "$GITHUB_ENV"
            echo "✗ Handoff-Artefakt-Key-Anzahl ungültig (expected=${expected_key_count}, actual=${actual_key_count})"
              echo "API_OPEN_EVIDENCE_GAP=handoff_failed" >> "$GITHUB_ENV"
            exit 1
          fi
          placeholder_re='^(CHANGE_ME|PLACEHOLDER|UPDATE_VALUE_IN_VAULT|YOUR_|REPLACE_|TODO)'
          handoff_errors=0
          for key in "${required_keys[@]}"; do
            value=$(grep -E "^${key}=" /tmp/api-runtime.env | sed -E "s/^${key}=//" || true)
            if [ -z "${value}" ]; then
              echo "✗ Handoff-Secret fehlt in .env.deploy: ${key}"
              handoff_errors=$((handoff_errors+1))
              continue
            fi
            if [[ "${value}" =~ ${placeholder_re} ]]; then
              echo "✗ Handoff-Secret enthält Platzhalter in .env.deploy: ${key}"
              handoff_errors=$((handoff_errors+1))
              continue
            fi
            echo "✓ Handoff-Secret vorhanden: ${key}"
          done

          if [ "${handoff_errors}" -gt 0 ]; then
            echo "API_HANDOFF_CONTRACT_STATUS=failed" >> "$GITHUB_ENV"
            echo "API_EVIDENCE_BREAKPOINT=handoff_local_artifact_invalid" >> "$GITHUB_ENV"
            echo "✗ Secret-Handoff-Artefakt ist ungültig (${handoff_errors} Fehler)."
              echo "API_OPEN_EVIDENCE_GAP=handoff_failed" >> "$GITHUB_ENV"
            exit 1
          fi
          echo "API_HANDOFF_CONTRACT_STATUS=ok" >> "$GITHUB_ENV"
          echo "API_EVIDENCE_BREAKPOINT=none" >> "$GITHUB_ENV"
          echo "✓ Secret-Handoff-Artefakt vollständig und ohne Platzhalter."

          # Pfad relativ zum Chroot-Home
          tar --exclude=".git" --exclude="__pycache__" --exclude="*.pyc" \
              --exclude=".venv" --exclude="venv" --exclude=".env" --exclude="*.log" \
              -czf /tmp/api.tar.gz -C apps/api .
          ssh plesk-prod "mkdir -p '${{ env.API_REMOTE_PATH }}'"
          scp -F ~/.ssh/config /tmp/api.tar.gz "plesk-prod:api.tar.gz"
          scp -F ~/.ssh/config /tmp/api-runtime.env "plesk-prod:${{ env.API_REMOTE_PATH }}/.env.deploy"
          ssh plesk-prod "tar -xzf api.tar.gz -C '${{ env.API_REMOTE_PATH }}' && rm api.tar.gz"
          ssh plesk-prod "
            set -e
            ENV_FILE='${{ env.API_REMOTE_PATH }}/.env'
            OVERLAY_FILE='${{ env.API_REMOTE_PATH }}/.env.deploy'
            TMP_FILE='${{ env.API_REMOTE_PATH }}/.env.merged'
            if [ -f \"\$ENV_FILE\" ]; then
              grep -vE '^(MAIL_TRANSPORT|DATABASE_URL|JWT_SECRET_KEY|STRIPE_SECRET_KEY|STRIPE_WEBHOOK_SECRET|MOE_API_TOKEN|N8N_WEBHOOK_SECRET|CIVICRM_SITE_KEY|CIVICRM_API_KEY|MICROSOFT_TENANT_ID|MICROSOFT_CLIENT_ID|MICROSOFT_CLIENT_SECRET|MICROSOFT_GRAPH_SENDER|ALERTS_SLACK_WEBHOOK)=' "\$ENV_FILE" > "\$TMP_FILE" || true
              cat \"\$OVERLAY_FILE\" >> \"\$TMP_FILE\"
              mv \"\$TMP_FILE\" \"\$ENV_FILE\"
              rm -f \"\$OVERLAY_FILE\"
            else
              mv \"\$OVERLAY_FILE\" \"\$ENV_FILE\"
            fi
            chmod 600 \"\$ENV_FILE\" || true
          "
          if ! ssh plesk-prod "
            set -e
            ENV_FILE='${{ env.API_REMOTE_PATH }}/.env'
            required_keys='MAIL_TRANSPORT DATABASE_URL JWT_SECRET_KEY STRIPE_SECRET_KEY STRIPE_WEBHOOK_SECRET MOE_API_TOKEN N8N_WEBHOOK_SECRET CIVICRM_SITE_KEY CIVICRM_API_KEY MICROSOFT_TENANT_ID MICROSOFT_CLIENT_ID MICROSOFT_CLIENT_SECRET MICROSOFT_GRAPH_SENDER ALERTS_SLACK_WEBHOOK'
            for key in \$required_keys; do
              grep -q \"^\${key}=\" \"\$ENV_FILE\" || { echo \"missing_key:\${key}\"; exit 19; }
            done
          "; then
            echo "API_HANDOFF_CONTRACT_STATUS=failed" >> "$GITHUB_ENV"
            echo "API_EVIDENCE_BREAKPOINT=handoff_remote_merge_missing_key" >> "$GITHUB_ENV"
            echo "✗ Remote-Handoff-Merge fehlgeschlagen oder Pflichtschlüssel fehlen nach Merge."
              echo "API_OPEN_EVIDENCE_GAP=handoff_failed" >> "$GITHUB_ENV"
            exit 1
          fi
          ssh plesk-prod \
            "printf '%s\n' '${{ steps.release.outputs.marker }}' > '${{ env.API_REMOTE_PATH }}/.deploy_release'"
          ssh plesk-prod "API_PATH='${{ env.API_REMOTE_PATH }}' EXPECTED_COMMIT='commit=${GITHUB_SHA::8}' bash -s" <<'REMOTE'
            set -euo pipefail

            fail() {
              echo "✗ $1"
              exit 1
            }

            cd "$API_PATH" || fail "API_REMOTE_PATH ist kein Directory"
            API_ABS_PATH="$(pwd -P)"
            RELEASE_FILE="$API_ABS_PATH/.deploy_release"

            [ -s "$API_ABS_PATH/.env" ] || fail ".env fehlt oder ist leer"
            [ -f "$API_ABS_PATH/app/main.py" ] || fail "app/main.py fehlt"
            [ -f "$API_ABS_PATH/requirements.txt" ] || fail "requirements.txt fehlt"
            [ -s "$RELEASE_FILE" ] || fail ".deploy_release fehlt oder ist leer"
            grep -Fq "$EXPECTED_COMMIT" "$RELEASE_FILE" || fail ".deploy_release enthaelt nicht den erwarteten Commit"

            PYTHON=""
            if [ -x "$API_ABS_PATH/venv/bin/python" ]; then
              PYTHON="$API_ABS_PATH/venv/bin/python"
            elif [ -x "$API_ABS_PATH/.venv/bin/python" ]; then
              PYTHON="$API_ABS_PATH/.venv/bin/python"
            elif command -v python3 >/dev/null 2>&1; then
              PYTHON="$(command -v python3)"
            elif command -v python >/dev/null 2>&1; then
              PYTHON="$(command -v python)"
            else
              fail "Kein Python-Interpreter verfuegbar"
            fi

            [ -x "$PYTHON" ] || fail "Python-Interpreter ist nicht ausfuehrbar"
            "$PYTHON" --version >/dev/null 2>&1 || fail "python --version fehlgeschlagen"
            "$PYTHON" -m pip --version >/dev/null 2>&1 || fail "pip fuer Interpreter nicht verfuegbar"
            PIP_INSTALL_LOG="$(mktemp "${API_ABS_PATH}/.pip-install.${GITHUB_RUN_ID:-manual}.XXXXXX.log")"
            if "$PYTHON" -m pip install -r requirements.txt --quiet >"$PIP_INSTALL_LOG" 2>&1; then
              tail -5 "$PIP_INSTALL_LOG"
            else
              echo "✗ pip install fehlgeschlagen. Letzte Log-Zeilen:"
              tail -5 "$PIP_INSTALL_LOG"
              rm -f "$PIP_INSTALL_LOG"
              exit 1
            fi
            rm -f "$PIP_INSTALL_LOG"
            "$PYTHON" -m uvicorn --version >/dev/null 2>&1 || fail "uvicorn fuer Interpreter nicht verfuegbar"
            printf '%s\n' "$PYTHON" > "$API_ABS_PATH/.deploy_python_interpreter"
            chmod 600 "$API_ABS_PATH/.deploy_python_interpreter" || true
            echo "✓ API-Handoff und Interpreter validiert"
          REMOTE
          API_USED_PYTHON=$(ssh plesk-prod "API_PATH='${{ env.API_REMOTE_PATH }}' bash -s" <<'REMOTE'
            set -euo pipefail
            cd "$API_PATH"
            API_ABS_PATH="$(pwd -P)"
            sed -n '1p' "$API_ABS_PATH/.deploy_python_interpreter"
          REMOTE
          )
          if [ -z "${API_USED_PYTHON}" ]; then
            echo "API_HANDOFF_CONTRACT_STATUS=failed" >> "$GITHUB_ENV"
            echo "API_EVIDENCE_BREAKPOINT=handoff_missing_interpreter_marker" >> "$GITHUB_ENV"
            echo "✗ Gespeicherter API-Python-Interpreter ist leer"
              echo "API_OPEN_EVIDENCE_GAP=handoff_failed" >> "$GITHUB_ENV"
            exit 1
          fi
          API_RELEASE_MARKER_COMMIT=$(ssh plesk-prod "API_PATH='${{ env.API_REMOTE_PATH }}' bash -s" <<'REMOTE'
            set -euo pipefail
            cd "$API_PATH"
            API_ABS_PATH="$(pwd -P)"
            RELEASE_FILE="$API_ABS_PATH/.deploy_release"
            grep -oE 'commit=[^ ]+' "$RELEASE_FILE" | head -1 | cut -d= -f2
          REMOTE
          )
          if [ "${API_RELEASE_MARKER_COMMIT}" != "${GITHUB_SHA::8}" ]; then
            echo "API_HANDOFF_CONTRACT_STATUS=failed" >> "$GITHUB_ENV"
            echo "API_EVIDENCE_BREAKPOINT=handoff_release_marker_mismatch" >> "$GITHUB_ENV"
            echo "✗ API-Release-Marker zeigt nicht auf den erwarteten Commit."
              echo "API_OPEN_EVIDENCE_GAP=handoff_failed" >> "$GITHUB_ENV"
            exit 1
          fi
          echo "API_USED_PYTHON=${API_USED_PYTHON}" >> "$GITHUB_ENV"
          echo "API_RELEASE_MARKER_COMMIT=${API_RELEASE_MARKER_COMMIT}" >> "$GITHUB_ENV"
          echo "✓ API deployt."

      - name: API Runtime Reload triggern
        if: >
          env.TARGET_SERVICE == 'all' ||
          env.TARGET_SERVICE == 'api'
        run: |
          set -euo pipefail
          echo "API_RESTART_STATUS=running" >> "$GITHUB_ENV"
          if ssh plesk-prod "API_PATH='${{ env.API_REMOTE_PATH }}' bash -s" <<'REMOTE'
            set -euo pipefail

            fail() {
              echo "✗ $1"
              exit 1
            }

            cd "$API_PATH" || fail "API_REMOTE_PATH nicht erreichbar"
            API_ABS_PATH="$(pwd -P)"
            INTERPRETER_FILE="$API_ABS_PATH/.deploy_python_interpreter"
            [ -s "$INTERPRETER_FILE" ] || fail ".deploy_python_interpreter fehlt oder ist leer"
            PYTHON="$(sed -n '1p' "$INTERPRETER_FILE")"
            [ -n "$PYTHON" ] || fail "Gespeicherter Python-Interpreter ist leer"
            [ -x "$PYTHON" ] || fail "Gespeicherter Python-Interpreter ist nicht ausfuehrbar"
            "$PYTHON" --version >/dev/null 2>&1 || fail "python --version fehlgeschlagen"
            "$PYTHON" -m pip --version >/dev/null 2>&1 || fail "pip fuer gespeicherten Interpreter nicht verfuegbar"
            "$PYTHON" -m uvicorn --version >/dev/null 2>&1 || fail "uvicorn fuer gespeicherten Interpreter nicht verfuegbar"

            pkill -f 'uvicorn app.main:app' || true
            sleep 1
            nohup "$PYTHON" -m uvicorn app.main:app --host 0.0.0.0 --port 8001 --log-level warning >/dev/null 2>&1 &

            FOUND_PROCESS=0
            for _ in 1 2 3 4 5; do
              if pgrep -f 'uvicorn app.main:app' >/dev/null 2>&1; then
                FOUND_PROCESS=1
                break
              fi
              sleep 1
            done
            [ "$FOUND_PROCESS" -eq 1 ] || fail "uvicorn-Prozess nach Restart nicht gefunden"

            PORT_TOOL="none"
            PORT_OK="unknown"
            if command -v ss >/dev/null 2>&1; then
              PORT_TOOL="ss"
              ss -ltn 2>/dev/null | awk '{print $4}' | grep -Eq '(^|:)8001$' && PORT_OK="yes" || PORT_OK="no"
            elif command -v lsof >/dev/null 2>&1; then
              PORT_TOOL="lsof"
              lsof -nP -iTCP:8001 -sTCP:LISTEN >/dev/null 2>&1 && PORT_OK="yes" || PORT_OK="no"
            elif command -v netstat >/dev/null 2>&1; then
              PORT_TOOL="netstat"
              netstat -ltn 2>/dev/null | awk '{print $4}' | grep -Eq '(^|:)8001$' && PORT_OK="yes" || PORT_OK="no"
            fi

            if [ "$PORT_OK" = "no" ]; then
              fail "Port 8001 ist laut ${PORT_TOOL} nicht im LISTEN-Status"
            fi
            if [ "$PORT_TOOL" = "none" ]; then
              echo "⚠️ Kein Port-Prueftool vorhanden; externer 30s-Verify entscheidet hart."
            else
              echo "✓ Port 8001 geprueft via ${PORT_TOOL}"
            fi

            echo "✓ API-Restart erfolgreich"
          REMOTE
          then
            echo "API_RESTART_STATUS=ok" >> "$GITHUB_ENV"
          else
            echo "API_RESTART_STATUS=failed" >> "$GITHUB_ENV"
            exit 1
          fi
          echo "Warte 12 Sekunden auf Runtime-Warm-up ..."
          sleep 12

      # ── CRM deployen ────────────────────────────────────────
      - name: CRM-Portal-Artefakt herunterladen
        if: >
          env.TARGET_SERVICE == 'all' ||
          env.TARGET_SERVICE == 'crm'
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: frontend-dist-${{ github.sha }}
          path: _dist_crm_portal/

      - name: CRM-Portal → scp (Chroot-SSH)
        if: >
          env.TARGET_SERVICE == 'all' ||
          env.TARGET_SERVICE == 'crm'
        run: |
          find _dist_crm_portal -name "*.map" -delete
          ssh plesk-prod "
            set -e
            mkdir -p '${{ env.CRM_REMOTE_PATH }}' '${{ env.CRM_NATIVE_REMOTE_PATH }}' '${{ env.CRM_NATIVE_BUILD_PATH }}' '${{ env.CRM_REMOTE_PATH }}/config' '${{ env.CRM_REMOTE_PATH }}/private'
            find '${{ env.CRM_REMOTE_PATH }}' -mindepth 1 -maxdepth 1 \
              ! -name native \
              ! -name .native-build \
              ! -name .well-known \
              ! -name config \
              ! -name private \
              -exec rm -rf {} +
          "
          scp -r -F ~/.ssh/config \
            _dist_crm_portal/. \
            "plesk-prod:${{ env.CRM_REMOTE_PATH }}/"
          ssh plesk-prod \
            "printf '%s\n' '${{ steps.release.outputs.marker }} portal-root' > '${{ env.CRM_REMOTE_PATH }}/.deploy_release'"
          echo "✓ CRM-Portal deployt."

      - name: CRM-Native-Quelle hochladen
        if: >
          env.TARGET_SERVICE == 'all' ||
          env.TARGET_SERVICE == 'crm'
        run: |
          tar --exclude=".git" --exclude="node_modules" --exclude="vendor" \
              --exclude="web/sites/*/files" --exclude=".env" --exclude="*.log" \
              -czf /tmp/crm-native-src.tar.gz -C apps/crm .
          scp -F ~/.ssh/config /tmp/crm-native-src.tar.gz "plesk-prod:crm-native-src.tar.gz"
          ssh plesk-prod "
            set -e
            mkdir -p '${{ env.CRM_NATIVE_BUILD_PATH }}'
            find '${{ env.CRM_NATIVE_BUILD_PATH }}' -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            tar -xzf crm-native-src.tar.gz -C '${{ env.CRM_NATIVE_BUILD_PATH }}'
            rm crm-native-src.tar.gz
          "
          echo "✓ CRM-Native-Quelle hochgeladen."

      - name: CRM-Native bauen und synchronisieren
        if: >
          env.TARGET_SERVICE == 'all' ||
          env.TARGET_SERVICE == 'crm'
        run: |
          ssh plesk-prod "
            set -e
            cd '${{ env.CRM_NATIVE_BUILD_PATH }}'
            command -v composer >/dev/null
            composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction 2>&1 | tail -20
            mkdir -p web/sites/default/files
            if [ -x vendor/bin/drush ]; then
              if php vendor/bin/drush --root=web status --field=bootstrap 2>/dev/null | grep -qi Successful; then
                php vendor/bin/drush --root=web updatedb -y
                php vendor/bin/drush --root=web config:import -y
                php vendor/bin/drush --root=web cache:rebuild
              else
                echo '⚠️ Drupal bootstrap nicht erfolgreich; updb/cim/cr wurden uebersprungen.'
              fi
            fi
            mkdir -p '${{ env.CRM_NATIVE_REMOTE_PATH }}' '${{ env.CRM_REMOTE_PATH }}/config' '${{ env.CRM_REMOTE_PATH }}/private/cron' '${{ env.CRM_REMOTE_PATH }}/private/logs'
            if command -v rsync >/dev/null; then
              rsync -a --delete --exclude 'sites/default/files/***' '${{ env.CRM_NATIVE_BUILD_PATH }}/web/' '${{ env.CRM_NATIVE_REMOTE_PATH }}/'
              rsync -a --delete '${{ env.CRM_NATIVE_BUILD_PATH }}/config/' '${{ env.CRM_REMOTE_PATH }}/config/'
              if [ -d '${{ env.CRM_NATIVE_BUILD_PATH }}/private/cron' ]; then
                rsync -a --delete '${{ env.CRM_NATIVE_BUILD_PATH }}/private/cron/' '${{ env.CRM_REMOTE_PATH }}/private/cron/'
              fi
            else
              find '${{ env.CRM_NATIVE_REMOTE_PATH }}' -mindepth 1 -maxdepth 1 ! -name sites -exec rm -rf {} +
              mkdir -p '${{ env.CRM_NATIVE_REMOTE_PATH }}/sites/default/files'
              tar -C '${{ env.CRM_NATIVE_BUILD_PATH }}/web' --exclude='sites/default/files' -cf - . | tar -C '${{ env.CRM_NATIVE_REMOTE_PATH }}' -xf -
              rm -rf '${{ env.CRM_REMOTE_PATH }}/config'
              mkdir -p '${{ env.CRM_REMOTE_PATH }}/config'
              tar -C '${{ env.CRM_NATIVE_BUILD_PATH }}' -cf - config | tar -C '${{ env.CRM_REMOTE_PATH }}' -xf -
              if [ -d '${{ env.CRM_NATIVE_BUILD_PATH }}/private/cron' ]; then
                rm -rf '${{ env.CRM_REMOTE_PATH }}/private/cron'
                mkdir -p '${{ env.CRM_REMOTE_PATH }}/private/cron'
                tar -C '${{ env.CRM_NATIVE_BUILD_PATH }}/private' -cf - cron | tar -C '${{ env.CRM_REMOTE_PATH }}/private' -xf -
              fi
            fi
            chmod -R 775 '${{ env.CRM_NATIVE_REMOTE_PATH }}/sites/default/files' || true
            chmod -R 750 '${{ env.CRM_REMOTE_PATH }}/private' || true
            printf '%s\n' '${{ steps.release.outputs.marker }} native-runtime' > '${{ env.CRM_NATIVE_REMOTE_PATH }}/.deploy_release'
          "
          echo "✓ CRM-Native unter /native synchronisiert."

      # ── Games deployen ──────────────────────────────────────
      - name: Games-Artefakt herunterladen
        if: >
          env.TARGET_SERVICE == 'all' ||
          env.TARGET_SERVICE == 'games'
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: games-dist-${{ github.sha }}
          path: _dist_games/

      - name: Games → scp (Chroot-SSH)
        if: >
          env.TARGET_SERVICE == 'all' ||
          env.TARGET_SERVICE == 'games'
        run: |
          ssh plesk-prod "mkdir -p '${{ env.GAMES_REMOTE_PATH }}'"
          scp -r -F ~/.ssh/config \
            _dist_games/. \
            "plesk-prod:${{ env.GAMES_REMOTE_PATH }}/"
          ssh plesk-prod \
            "printf '%s\n' '${{ steps.release.outputs.marker }}' > '${{ env.GAMES_REMOTE_PATH }}/.deploy_release'"
          echo "✓ Games deployt."

      # ── Health-Checks ───────────────────────────────────────
      - name: Healthcheck — Frontend
        if: >
          always() && (
            env.TARGET_SERVICE == 'all' ||
            env.TARGET_SERVICE == 'frontend'
          )
        run: |
          sleep 5
          HTTP=$(curl --silent --max-time 15 --output /dev/null --write-out "%{http_code}" \
            "https://${{ env.MAIN_DOMAIN }}/")
          echo "Frontend HTTP: ${HTTP}"
          [[ "${HTTP}" =~ ^[23] ]] || { echo "✗ Frontend Healthcheck fehlgeschlagen."; exit 1; }

      - name: Public Route Smoke — Live
        if: >
          always() && (
            env.TARGET_SERVICE == 'all' ||
            env.TARGET_SERVICE == 'frontend'
          )
        run: |
          node apps/website/scripts/check-route-health.mjs \
            "https://www.${{ env.MAIN_DOMAIN }}" \
            / \
            /kontakt \
            /mitglied-werden \
            /spenden \
            /forum \
            /spiel \
            /login \
            /barrierefreiheit

      - name: Release Marker — Frontend
        if: >
          always() && (
            env.TARGET_SERVICE == 'all' ||
            env.TARGET_SERVICE == 'frontend'
          )
        run: |
          MARKER=$(curl --silent --max-time 15 "https://www.${{ env.MAIN_DOMAIN }}/.deploy_release" || true)
          echo "${MARKER}"
          echo "${MARKER}" | grep -q "commit=${GITHUB_SHA::8}" || {
            echo "✗ Frontend-Release-Marker zeigt nicht auf den erwarteten Commit.";
            exit 1;
          }

      - name: API Verify — Health + Readiness
        if: >
          env.TARGET_SERVICE == 'all' ||
          env.TARGET_SERVICE == 'api'
        run: |
          set -euo pipefail

          verify_endpoint() {
            local path=$1
            local env_name=$2
            local label=$3
            local url="https://api.${{ env.MAIN_DOMAIN }}${path}"
            local deadline=$((SECONDS + 30))
            local last_http="000"
            local last_reason="nicht erreicht"

            while (( SECONDS < deadline )); do
              local remaining=$((deadline - SECONDS))
              local curl_timeout=5
              if (( remaining < curl_timeout )); then
                curl_timeout=$remaining
              fi
              if (( curl_timeout < 1 )); then
                break
              fi

              local body_file
              body_file=$(mktemp)
              local http
              http=$(curl --silent --show-error --max-time "${curl_timeout}" \
                --output "${body_file}" \
                --write-out "%{http_code}" \
                "${url}" 2>/dev/null || true)
              last_http="${http:-000}"

              local body_compact
              body_compact=$(tr -d '\r\n\t ' < "${body_file}" || true)
              local body_lower
              body_lower=$(tr '[:upper:]' '[:lower:]' < "${body_file}" || true)
              rm -f "${body_file}"

              if [ -n "${body_compact}" ] && [[ "${body_lower}" =~ (unhealthy|error|failed|unavailable|not[[:space:]_-]*ready|\"ready\"[[:space:]]*:[[:space:]]*false|ready[[:space:]]*:[[:space:]]*false|\"ok\"[[:space:]]*:[[:space:]]*false|ok[[:space:]]*:[[:space:]]*false|\"status\"[[:space:]]*:[[:space:]]*\"?(error|failed|unavailable)|status[[:space:]]*:[[:space:]]*\"?(error|failed|unavailable)) ]]; then
                echo "${env_name}=failed (${last_http})" >> "$GITHUB_ENV"
                echo "✗ ${label} meldet negatives Health-/Readiness-Signal"
                exit 1
              elif ! [[ "${last_http}" =~ ^[23][0-9][0-9]$ ]]; then
                last_reason="HTTP ${last_http}"
              elif [ -z "${body_compact}" ]; then
                last_reason="Body leer"
              elif ! [[ "${body_lower}" =~ (\{|\[|\"status\"|status|ok|healthy|ready|live|true) ]]; then
                last_reason="Body ohne erwartbares Status-Signal"
              else
                echo "✓ ${label}: HTTP ${last_http}"
                echo "${env_name}=HTTP ${last_http}" >> "$GITHUB_ENV"
                return 0
              fi

              remaining=$((deadline - SECONDS))
              if (( remaining > 2 )); then
                sleep 2
              elif (( remaining > 0 )); then
                sleep "${remaining}"
              fi
            done

            echo "${env_name}=failed (${last_http})" >> "$GITHUB_ENV"
            echo "✗ ${label} fehlgeschlagen nach 30 Sekunden: ${last_reason}"
            exit 1
          }

          verify_endpoint "/healthz" "API_HEALTHZ_STATUS" "API /healthz"
          verify_endpoint "/readyz" "API_READYZ_STATUS" "API /readyz"

      - name: API Runtime Secret-Contract Report (redigiert)
        if: >
          env.TARGET_SERVICE == 'all' ||
          env.TARGET_SERVICE == 'api'
        run: |
          set -euo pipefail

          CONTRACT_JSON=$(ssh plesk-prod "API_PATH='${{ env.API_REMOTE_PATH }}' bash -s" <<'REMOTE'
            set -euo pipefail
            cd "$API_PATH"
            API_ABS_PATH="$(pwd -P)"
            INTERPRETER_FILE="$API_ABS_PATH/.deploy_python_interpreter"
            [ -s "$INTERPRETER_FILE" ] || { echo "{\"error\":\"missing_interpreter_file\"}"; exit 1; }
            PYTHON="$(sed -n '1p' "$INTERPRETER_FILE")"
            [ -x "$PYTHON" ] || { echo "{\"error\":\"interpreter_not_executable\"}"; exit 1; }
            cd "$API_ABS_PATH"
            "$PYTHON" -c "import json,os; from app.runtime_secret_contract import runtime_secret_contract_report; environment=(os.getenv('ENVIRONMENT') or os.getenv('APP_ENV') or 'development').strip() or 'development'; report=runtime_secret_contract_report(environment); print(json.dumps(report, separators=(',', ':'), ensure_ascii=True))"
          REMOTE
          )

          if [ -z "$CONTRACT_JSON" ]; then
            echo "✗ Runtime-Secret-Contract-Report leer"
            exit 1
          fi

          echo "RUNTIME_SECRET_CONTRACT_JSON=$CONTRACT_JSON" >> "$GITHUB_ENV"

          CONTRACT_OK=$(printf '%s' "$CONTRACT_JSON" | jq -r '.contract_ok // false')
          GRAPH_OK=$(printf '%s' "$CONTRACT_JSON" | jq -r '.channels.graph_mail_configured // false')
          SLACK_OK=$(printf '%s' "$CONTRACT_JSON" | jq -r '.channels.slack_webhook_configured // false')

          if [ "$GRAPH_OK" = "true" ]; then
            echo "API_GRAPH_CHANNEL_CONFIG_STATUS=configured" >> "$GITHUB_ENV"
          else
            echo "API_GRAPH_CHANNEL_CONFIG_STATUS=not_configured" >> "$GITHUB_ENV"
          fi
          if [ "$SLACK_OK" = "true" ]; then
            echo "API_SLACK_CHANNEL_CONFIG_STATUS=configured" >> "$GITHUB_ENV"
          else
            echo "API_SLACK_CHANNEL_CONFIG_STATUS=not_configured" >> "$GITHUB_ENV"
          fi

          if [ "$CONTRACT_OK" != "true" ] || [ "$GRAPH_OK" != "true" ] || [ "$SLACK_OK" != "true" ]; then
            echo "✗ Runtime-Secret-Contract verletzt (contract_ok=$CONTRACT_OK, graph_mail=$GRAPH_OK, slack=$SLACK_OK)"
            echo "API_SECRET_RUNTIME_STATUS=failed" >> "$GITHUB_ENV"
            echo "API_EVIDENCE_BREAKPOINT=runtime_contract_failed" >> "$GITHUB_ENV"
              echo "API_OPEN_EVIDENCE_GAP=runtime_contract_failed" >> "$GITHUB_ENV"
            exit 1
          fi

          echo "API_SECRET_RUNTIME_STATUS=ok" >> "$GITHUB_ENV"
          printf '%s\n' "$CONTRACT_JSON" > /tmp/api-runtime-secret-contract.json
          echo "✓ Runtime-Secret-Contract inkl. Graph/Slack-Kanäle ist valide."

      - name: Notification Live-Probe (Graph/Slack) oder manueller nächster Schritt
        if: >
          env.TARGET_SERVICE == 'all' ||
          env.TARGET_SERVICE == 'api'
        run: |
          set -euo pipefail

          if [ "${LIVE_NOTIFICATION_PROBE}" != "true" ]; then
            echo "API_NOTIFICATION_PROBE_STATUS=manual-step-required" >> "$GITHUB_ENV"
            echo "API_NOTIFICATION_PROBE_BREAKPOINT=live_probe_disabled" >> "$GITHUB_ENV"
            echo "API_GRAPH_CHANNEL_PROBE_STATUS=not_probed" >> "$GITHUB_ENV"
            echo "API_SLACK_CHANNEL_PROBE_STATUS=not_probed" >> "$GITHUB_ENV"
            echo "API_OPEN_EVIDENCE_GAP=live_probe_not_executed" >> "$GITHUB_ENV"
            echo "LIVE-Probe deaktiviert (vars.LIVE_NOTIFICATION_PROBE != true)."
            echo "Manueller Nachweis: Stripe-Test-Webhook \`payment_intent.payment_failed\` gegen den bestehenden Endpunkt auslösen — bestätigt Admin-Mail (Graph) und Slack-Alert in einem einzigen produktionsnahen Pfad." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          PROBE_RESULT=$(ssh plesk-prod "API_PATH='${{ env.API_REMOTE_PATH }}' bash -s" <<'REMOTE'
            set -euo pipefail
            cd "$API_PATH"
            API_ABS_PATH="$(pwd -P)"
            INTERPRETER_FILE="$API_ABS_PATH/.deploy_python_interpreter"
            [ -s "$INTERPRETER_FILE" ] || { echo "{\"probe\":\"failed\",\"breakpoint\":\"missing_interpreter\"}"; exit 0; }
            PYTHON="$(sed -n '1p' "$INTERPRETER_FILE")"
            [ -x "$PYTHON" ] || { echo "{\"probe\":\"failed\",\"breakpoint\":\"interpreter_not_executable\"}"; exit 0; }
            cd "$API_ABS_PATH"
            "$PYTHON" -c "import json; from app.runtime_notification_probe import run_live_notification_probe; print(json.dumps(run_live_notification_probe(), separators=(',', ':'), ensure_ascii=True))"
          REMOTE
          )

          echo "API_NOTIFICATION_PROBE_JSON=$PROBE_RESULT" >> "$GITHUB_ENV"
          PROBE_OK=$(printf '%s' "$PROBE_RESULT" | jq -r '.probe == "ok"')
          GRAPH_PROBE_OK=$(printf '%s' "$PROBE_RESULT" | jq -r '.graph_token_probe // false')
          SLACK_PROBE_OK=$(printf '%s' "$PROBE_RESULT" | jq -r '.slack_webhook_probe // false')

          if [ "$GRAPH_PROBE_OK" = "true" ]; then
            echo "API_GRAPH_CHANNEL_PROBE_STATUS=ok" >> "$GITHUB_ENV"
          else
            echo "API_GRAPH_CHANNEL_PROBE_STATUS=failed" >> "$GITHUB_ENV"
          fi
          if [ "$SLACK_PROBE_OK" = "true" ]; then
            echo "API_SLACK_CHANNEL_PROBE_STATUS=ok" >> "$GITHUB_ENV"
          else
            echo "API_SLACK_CHANNEL_PROBE_STATUS=failed" >> "$GITHUB_ENV"
          fi

          if [ "$PROBE_OK" != "true" ]; then
            BREAKPOINT=$(printf '%s' "$PROBE_RESULT" | jq -r '.breakpoint // "unknown"')
            echo "API_NOTIFICATION_PROBE_STATUS=failed" >> "$GITHUB_ENV"
            echo "API_NOTIFICATION_PROBE_BREAKPOINT=$BREAKPOINT" >> "$GITHUB_ENV"
            echo "API_EVIDENCE_BREAKPOINT=notification_probe_failed" >> "$GITHUB_ENV"
            echo "✗ LIVE-Notification-Probe fehlgeschlagen am Bruchpunkt: $BREAKPOINT"
            echo "Bruchpunkt '$BREAKPOINT': Stripe-Test-Webhook \`payment_intent.payment_failed\` auslösen — deckt Graph-Mail und Slack in einem Pfad ab." >> "$GITHUB_STEP_SUMMARY"
              echo "API_OPEN_EVIDENCE_GAP=probe_failed" >> "$GITHUB_ENV"
            exit 1
          fi

          echo "API_NOTIFICATION_PROBE_STATUS=ok" >> "$GITHUB_ENV"
          echo "API_NOTIFICATION_PROBE_BREAKPOINT=none" >> "$GITHUB_ENV"
          echo "API_OPEN_EVIDENCE_GAP=none" >> "$GITHUB_ENV"
          echo "✓ LIVE-Notification-Probe abgeschlossen: Graph-Credentials gültig (Token-Erwerb verifiziert, kein Test-Mail gesendet), Slack-Webhook erreichbar und hat geantwortet."

      - name: API Produktionsnachweis-JSON erzeugen (redigiert)
        if: >
          always() && (
            env.TARGET_SERVICE == 'all' ||
            env.TARGET_SERVICE == 'api'
          )
        run: |
          set -euo pipefail
          if [ "${API_OPEN_EVIDENCE_GAP:-none}" = "live_probe_not_executed" ]; then
            DECISION_BASIS="live_probe_disabled_allows_success_with_explicit_gap"
          elif [ "${API_NOTIFICATION_PROBE_STATUS:-not-run}" = "ok" ]; then
            DECISION_BASIS="live_probe_executed_and_passed"
          elif [ "${API_NOTIFICATION_PROBE_STATUS:-not-run}" = "failed" ]; then
            DECISION_BASIS="live_probe_executed_and_failed"
          else
            DECISION_BASIS="probe_not_reached_prior_step_failed"
          fi
          TS=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          EVIDENCE_FILE="/tmp/api-production-evidence-${GITHUB_SHA}.json"
          jq -n \
            --arg run_id "${GITHUB_RUN_ID}" \
            --arg sha "${GITHUB_SHA}" \
            --arg timestamp "${TS}" \
            --arg target_service "${TARGET_SERVICE}" \
            --arg handoff_status "${API_HANDOFF_CONTRACT_STATUS:-not-run}" \
            --arg runtime_contract_status "${API_SECRET_RUNTIME_STATUS:-not-run}" \
            --arg graph_config_status "${API_GRAPH_CHANNEL_CONFIG_STATUS:-unknown}" \
            --arg slack_config_status "${API_SLACK_CHANNEL_CONFIG_STATUS:-unknown}" \
            --arg graph_probe_status "${API_GRAPH_CHANNEL_PROBE_STATUS:-not-run}" \
            --arg slack_probe_status "${API_SLACK_CHANNEL_PROBE_STATUS:-not-run}" \
            --arg notification_probe_status "${API_NOTIFICATION_PROBE_STATUS:-not-run}" \
            --arg notification_probe_breakpoint "${API_NOTIFICATION_PROBE_BREAKPOINT:-none}" \
            --arg evidence_breakpoint "${API_EVIDENCE_BREAKPOINT:-none}" \
            --arg open_evidence_gap "${API_OPEN_EVIDENCE_GAP:-none}" \
            --arg decision_basis "${DECISION_BASIS}" \
            '{
              run_id: $run_id,
              sha: $sha,
              timestamp: $timestamp,
              target_service: $target_service,
              handoff_status: $handoff_status,
              runtime_contract_status: $runtime_contract_status,
              graph_channel: {
                configured: $graph_config_status,
                probe: $graph_probe_status
              },
              slack_channel: {
                configured: $slack_config_status,
                probe: $slack_probe_status
              },
              notification_probe_status: $notification_probe_status,
              notification_probe_breakpoint: $notification_probe_breakpoint,
              evidence_breakpoint: $evidence_breakpoint,
              open_evidence_gap: $open_evidence_gap,
              decision_basis: $decision_basis
            }' > "$EVIDENCE_FILE"

      - name: API Produktionsnachweis-Artefakt hochladen
        if: >
          always() && (
            env.TARGET_SERVICE == 'all' ||
            env.TARGET_SERVICE == 'api'
          )
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: api-production-evidence-${{ github.sha }}
          path: |
            /tmp/api-production-evidence-${{ github.sha }}.json
            /tmp/api-runtime-secret-contract.json
          if-no-files-found: warn
          retention-days: 14

      - name: Healthcheck — CRM-Portal
        if: >
          always() && (
            env.TARGET_SERVICE == 'all' ||
            env.TARGET_SERVICE == 'crm'
          )
        run: |
          sleep 5
          HTTP=$(curl --silent --max-time 15 --output /dev/null --write-out "%{http_code}" \
            "https://crm.${{ env.MAIN_DOMAIN }}/")
          echo "CRM Portal HTTP: ${HTTP}"
          [[ "${HTTP}" =~ ^[23] ]] || { echo "✗ CRM-Portal Healthcheck fehlgeschlagen."; exit 1; }

      - name: CRM Route Smoke — Live
        if: >
          always() && (
            env.TARGET_SERVICE == 'all' ||
            env.TARGET_SERVICE == 'crm'
          )
        run: |
          node apps/website/scripts/check-route-health.mjs \
            "https://crm.${{ env.MAIN_DOMAIN }}" \
            / \
            /login

      - name: Release Marker — CRM
        if: >
          always() && (
            env.TARGET_SERVICE == 'all' ||
            env.TARGET_SERVICE == 'crm'
          )
        run: |
          MARKER=$(curl --silent --max-time 15 "https://crm.${{ env.MAIN_DOMAIN }}/.deploy_release" || true)
          echo "${MARKER}"
          echo "${MARKER}" | grep -q "commit=${GITHUB_SHA::8}" || {
            echo "✗ CRM-Release-Marker zeigt nicht auf den erwarteten Commit.";
            exit 1;
          }

      - name: Healthcheck — CRM-Native
        if: >
          always() && (
            env.TARGET_SERVICE == 'all' ||
            env.TARGET_SERVICE == 'crm'
          )
        run: |
          sleep 5
          HTTP=$(curl --silent --max-time 15 --output /dev/null --write-out "%{http_code}" \
            "https://crm.${{ env.MAIN_DOMAIN }}/native/")
          echo "CRM Native HTTP: ${HTTP}"
          [[ "${HTTP}" =~ ^[23] ]] || { echo "✗ CRM-Native Healthcheck fehlgeschlagen."; exit 1; }

      - name: Healthcheck — Games
        if: >
          always() && (
            env.TARGET_SERVICE == 'all' ||
            env.TARGET_SERVICE == 'games'
          )
        run: |
          sleep 5
          HTTP=$(curl --silent --max-time 15 --output /dev/null --write-out "%{http_code}" \
            "https://games.${{ env.MAIN_DOMAIN }}/")
          echo "Games HTTP: ${HTTP}"
          [[ "${HTTP}" =~ ^[23] ]] || { echo "✗ Games Healthcheck fehlgeschlagen."; exit 1; }

      - name: Games Route Smoke — Live
        if: >
          always() && (
            env.TARGET_SERVICE == 'all' ||
            env.TARGET_SERVICE == 'games'
          )
        run: |
          node apps/website/scripts/check-route-health.mjs \
            "https://games.${{ env.MAIN_DOMAIN }}" \
            /

      # ── Deployment-Zusammenfassung ──────────────────────────
      - name: Deployment-Zusammenfassung
        if: always()
        run: |
          echo "## 🚀 Deployment abgeschlossen" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Wert |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | ${{ env.TARGET_SERVICE }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Zeitstempel | ${{ steps.release.outputs.timestamp }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Akteur | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🌐 Frontend | https://${{ env.MAIN_DOMAIN }}/ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ⚙️ API | https://api.${{ env.MAIN_DOMAIN }}/ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📋 CRM | https://crm.${{ env.MAIN_DOMAIN }}/ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🧭 CRM Native | https://crm.${{ env.MAIN_DOMAIN }}/native/ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🎮 Games | https://games.${{ env.MAIN_DOMAIN }}/ |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| API Deploy-Vertrag | Wert |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Ziel-Service | ${{ env.TARGET_SERVICE }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| API_REMOTE_PATH | \`${{ env.API_REMOTE_PATH }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| PLESK_HOST | ${PLESK_HOST:-nicht gesetzt} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| PLESK_USER | ${PLESK_USER:-nicht gesetzt} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Secret-Handoff (.env.deploy) | ${API_HANDOFF_CONTRACT_STATUS:-nicht geprueft} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Runtime-Secret-Contract | ${API_SECRET_RUNTIME_STATUS:-nicht geprueft} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Notification-Probe | ${API_NOTIFICATION_PROBE_STATUS:-nicht ausgefuehrt} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Probe-Bruchpunkt | ${API_NOTIFICATION_PROBE_BREAKPOINT:-n/a} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Evidenz-Bruchpunkt | ${API_EVIDENCE_BREAKPOINT:-n/a} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Python-Interpreter | \`${API_USED_PYTHON:-nicht ausgefuehrt}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Restart-Status | ${API_RESTART_STATUS:-nicht ausgefuehrt} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| /healthz Status | ${API_HEALTHZ_STATUS:-nicht ausgefuehrt} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| /readyz Status | ${API_READYZ_STATUS:-nicht ausgefuehrt} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release-Marker-Commit | ${API_RELEASE_MARKER_COMMIT:-nicht geprueft} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### ✅ Produktionsnachweis (redigiert)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Nachweis | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Secret-Handoff | ${API_HANDOFF_CONTRACT_STATUS:-not-run} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Runtime-Secret-Contract | ${API_SECRET_RUNTIME_STATUS:-not-run} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Graph-Kanal (Konfiguration) | ${API_GRAPH_CHANNEL_CONFIG_STATUS:-unknown} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Slack-Kanal (Konfiguration) | ${API_SLACK_CHANNEL_CONFIG_STATUS:-unknown} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Graph-Kanal (Probe) | ${API_GRAPH_CHANNEL_PROBE_STATUS:-not-run} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Slack-Kanal (Probe) | ${API_SLACK_CHANNEL_PROBE_STATUS:-not-run} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Probe-Bruchpunkt | ${API_NOTIFICATION_PROBE_BREAKPOINT:-none} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Evidenz-Bruchpunkt | ${API_EVIDENCE_BREAKPOINT:-none} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Offene Restlücke | ${API_OPEN_EVIDENCE_GAP:-none} |" >> "$GITHUB_STEP_SUMMARY"
