name: Deploy Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── BSM Secret Injection (optional, wenn BW_ACCESS_TOKEN gesetzt) ──
  bsm-secrets:
    name: 'BSM: Staging Secrets laden'
    if: ${{ secrets.BW_ACCESS_TOKEN != '' }}
    uses: ./.github/workflows/reusable-bsm-secrets.yml
    with:
      profile: deploy-staging
    secrets:
      BW_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}

  build-and-deploy:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest
    needs: [bsm-secrets]
    if: always()
    environment: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.2.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run quality gates
        run: npm run quality:gates

      - name: Build workspace
        run: npm run build:all

      - name: Verify staging secrets
        env:
          STAGING_REMOTE_HOST: ${{ secrets.STAGING_REMOTE_HOST }}
          STAGING_REMOTE_USER: ${{ secrets.STAGING_REMOTE_USER }}
          STAGING_DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for var in STAGING_REMOTE_HOST STAGING_REMOTE_USER STAGING_DEPLOY_KEY; do
            value="${!var:-}"
            if [ -z "$value" ]; then
              echo "::error::Missing required secret: $var"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Configure SSH agent
        # webfactory/ssh-agent hält den Key im SSH-Agent (kein Schreiben auf Disk).
        # Das ist sicherer als echo "$KEY" > ~/.ssh/id_ed25519.
        uses: webfactory/ssh-agent@a6f90b1f127823b31d4d4a8d96047790581349bd # v0.9.1
        with:
          ssh-private-key: ${{ secrets.STAGING_DEPLOY_KEY }}

      - name: Add host to known_hosts
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          # STAGING_KNOWN_HOSTS muss im GitHub-Environment 'staging' abgelegt sein.
          # Erzeugen via: ssh-keyscan -p <port> <host> auf einem vertrauenswürdigen System,
          # dann als Secret STAGING_KNOWN_HOSTS speichern. Nie ssh-keyscan live im CI nutzen
          # (MITM-Angriff möglich während des TOFU-Vorgangs).
          if [ -z "${{ secrets.STAGING_KNOWN_HOSTS }}" ]; then
            echo "::error::Secret STAGING_KNOWN_HOSTS ist nicht gesetzt. Bitte im GitHub-Environment 'staging' hinterlegen."
            exit 1
          fi
          printf '%s\n' "${{ secrets.STAGING_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy to staging
        env:
          SAFE_DEPLOY_AUTO_CONFIRM: 'true'
          SAFE_DEPLOY_LOCAL_BASE: ${{ github.workspace }}
          SAFE_DEPLOY_REMOTE_HOST: ${{ secrets.STAGING_REMOTE_HOST }}
          SAFE_DEPLOY_REMOTE_USER: ${{ secrets.STAGING_REMOTE_USER }}
          SAFE_DEPLOY_REMOTE_PORT: ${{ secrets.STAGING_REMOTE_PORT }}
        run: ./scripts/safe-deploy.sh
