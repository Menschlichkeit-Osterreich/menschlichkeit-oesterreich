name: API Privacy Tests

on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/api/**'
      - '.github/workflows/api-tests.yml'

permissions:
  contents: read

jobs:
  tests:
    name: API Tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt

      - name: Run tests
        env:
          ENVIRONMENT: development
          CIVICRM_SITE_KEY: ${{ secrets.CIVICRM_SITE_KEY != '' && secrets.CIVICRM_SITE_KEY || format('ci-site-key-{0}', github.run_id) }}
          CIVICRM_API_KEY: ${{ secrets.CIVICRM_API_KEY != '' && secrets.CIVICRM_API_KEY || format('ci-api-key-{0}', github.run_id) }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET != '' && secrets.JWT_SECRET || format('ci-jwt-{0}-{1}', github.run_id, github.run_attempt) }}
        run: |
          cd apps/api && pytest -q tests/
