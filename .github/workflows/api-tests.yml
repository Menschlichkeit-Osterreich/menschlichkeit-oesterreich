name: API Privacy Tests

on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/api/**'
      - 'api.menschlichkeit-oesterreich.at/**'
      - '.github/workflows/api-tests.yml'

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
      - name: Run tests
        env:
          APP_ENV: development
          CIVI_SITE_KEY: ${{ secrets.CIVICRM_SITE_KEY != '' && secrets.CIVICRM_SITE_KEY || format('ci-site-key-{0}', github.run_id) }}
          CIVI_API_KEY: ${{ secrets.CIVICRM_API_KEY != '' && secrets.CIVICRM_API_KEY || format('ci-api-key-{0}', github.run_id) }}
          JWT_SECRET: ${{ secrets.JWT_SECRET != '' && secrets.JWT_SECRET || format('ci-jwt-{0}-{1}', github.run_id, github.run_attempt) }}
        run: |
          cd apps/api && pytest -q tests/
