name: Gitleaks

on:
  push:
    branches: [main, develop, chore/**, feature/**]
  pull_request:
    branches: [main, develop, chore/**, feature/**]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks-current-tree:
    name: Gitleaks Current Tree
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Run Gitleaks on current tree
        id: gitleaks_tree
        shell: bash
        run: |
          set +e
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:v8.24.2 \
            detect \
            --no-git \
            --source /repo \
            --config /repo/.gitleaks.toml \
            --redact \
            --report-format sarif \
            --report-path /repo/gitleaks-working-tree.sarif
          status=$?
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload current-tree SARIF
        if: always() && hashFiles('gitleaks-working-tree.sarif') != ''
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7  # v3.28.1
        with:
          sarif_file: gitleaks-working-tree.sarif
          category: gitleaks-current-tree

      - name: Upload current-tree artifact
        if: always() && hashFiles('gitleaks-working-tree.sarif') != ''
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        with:
          name: gitleaks-working-tree-sarif
          path: gitleaks-working-tree.sarif

      - name: Current-tree summary
        if: always()
        run: |
          echo "## Gitleaks Current Tree" >> "$GITHUB_STEP_SUMMARY"
          echo "- Exit-Code: ${{ steps.gitleaks_tree.outputs.exit_code || '0' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Policy: blocker" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail on current-tree findings
        if: steps.gitleaks_tree.outputs.exit_code != '0'
        run: |
          echo "Gitleaks hat im aktuellen Working Tree Funde erkannt oder der Scan ist fehlgeschlagen."
          exit 1

  gitleaks-history:
    name: Gitleaks History Report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Run Gitleaks on git history
        id: gitleaks_history
        shell: bash
        run: |
          set +e
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:v8.24.2 \
            detect \
            --source /repo \
            --config /repo/.gitleaks.toml \
            --redact \
            --log-opts=--all \
            --report-format json \
            --report-path /repo/gitleaks-history.json
          status=$?
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload history artifact
        if: always() && hashFiles('gitleaks-history.json') != ''
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        with:
          name: gitleaks-history-json
          path: gitleaks-history.json

      - name: History summary
        if: always()
        run: |
          echo "## Gitleaks History" >> "$GITHUB_STEP_SUMMARY"
          echo "- Exit-Code: ${{ steps.gitleaks_history.outputs.exit_code || '0' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Policy: non-blocking incident report" >> "$GITHUB_STEP_SUMMARY"
