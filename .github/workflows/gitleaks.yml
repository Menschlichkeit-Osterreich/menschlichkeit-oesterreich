name: Gitleaks

on:
  push:
    branches: [main, develop, chore/**, feature/**]
  pull_request:
    branches: [main, develop, chore/**, feature/**]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        # gitleaks-action@v2 nutzt die gepinnte Gitleaks-Binary intern (kein curl-to-binary).
        # Erlaubt benutzerdefinierte .gitleaks.toml mit Allowlist für Templates, Test-Fixtures etc.
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --no-git --source . --config .gitleaks.toml --redact
