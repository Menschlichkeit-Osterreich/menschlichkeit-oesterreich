name: Codacy Analysis (SARIF Gate)
'on':
  pull_request: {}
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  security-events: write

env:
  CODACY_SARIF_PATH: quality-reports/codacy-analysis.sarif
  CODACY_FINDINGS_THRESHOLD: '25'

jobs:
  codacy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Use Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4.2.0
        with:
          node-version: 22
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Ensure fresh Codacy CLI JAR
        run: |
          mkdir -p .codacy
          curl -fsSL \
            "https://github.com/codacy/codacy-analysis-cli/releases/latest/download/codacy-analysis-cli-assembly.jar" \
            -o .codacy/codacy-analysis-cli-assembly.jar
          java -jar .codacy/codacy-analysis-cli-assembly.jar --help >/dev/null

      - name: Analyze with Codacy (Node script → SARIF)
        run: |
          node ./scripts/ci/run-codacy.mjs

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@45775bd8235c68ba998cffa5171334d58593da47 # v3.28.1
        with:
          sarif_file: ${{ env.CODACY_SARIF_PATH }}
          category: codacy

      - name: Fail if findings exceed threshold
        id: gate
        # Default: 25 — erlaubt Style/Warning-Findings ohne CI-Block.
        # Kritische Security-Findings werden weiterhin geblockt wenn Codacy
        # diese als HIGH/CRITICAL einstuft und der Threshold überschritten wird.
        run: |
          THRESHOLD="${CODACY_FINDINGS_THRESHOLD:-25}"
          COUNT=$(node -e "const fs=require('fs');try{const s=fs.readFileSync(process.env.CODACY_SARIF_PATH,'utf8');const j=JSON.parse(s);const c=(j.runs||[]).reduce((a,r)=>a+((r.results||[]).length||0),0);console.log(String(c));}catch(e){console.log('0')}")
          echo "findings=$COUNT" >> $GITHUB_OUTPUT
          echo "Findings: $COUNT"
          if [ "$COUNT" -gt "$THRESHOLD" ]; then
            echo "::error::Codacy findings ($COUNT) exceed threshold ($THRESHOLD). Bitte Findings beheben."
            exit 1
          else
            echo "::notice::Codacy findings: $COUNT (Threshold: $THRESHOLD) — OK"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Codacy SARIF Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Findings: ${{ steps.gate.outputs.findings }}" >> $GITHUB_STEP_SUMMARY
