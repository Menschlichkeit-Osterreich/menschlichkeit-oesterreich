name: Codacy Analysis (SARIF Gate)
'on':
  pull_request: {}
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  security-events: write

jobs:
  codacy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Use Node.js 22
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.2.0
        with:
          node-version: 22
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Ensure fresh Codacy CLI JAR
        run: |
          mkdir -p .codacy
          curl -fsSL \
            "https://github.com/codacy/codacy-analysis-cli/releases/latest/download/codacy-analysis-cli-assembly.jar" \
            -o .codacy/codacy-analysis-cli-assembly.jar
          java -jar .codacy/codacy-analysis-cli-assembly.jar --help >/dev/null

      - name: Analyze with Codacy (Node script → SARIF)
        run: |
          node ./scripts/ci/run-codacy.mjs

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@45775bd8235c68ba998cffa5171334d58593da47 # v3.28.1
        with:
          sarif_file: codacy-analysis.sarif
          category: codacy

      - name: Fail if findings exceed threshold
        id: gate
        # Threshold konfigurierbar via Repository-Variable CODACY_FINDINGS_THRESHOLD.
        # Default: 25 — erlaubt Style/Warning-Findings ohne CI-Block.
        # Kritische Security-Findings werden weiterhin geblockt wenn Codacy
        # diese als HIGH/CRITICAL einstuft und der Threshold überschritten wird.
        env:
          CODACY_FINDINGS_THRESHOLD: ${{ vars.CODACY_FINDINGS_THRESHOLD || '25' }}
        run: |
          sudo apt-get update -y && sudo apt-get install -y jq
          COUNT=$(jq -r '[.runs[].results|length] | add // 0' codacy-analysis.sarif || echo 0)
          echo "findings=$COUNT" >> $GITHUB_OUTPUT
          echo "Findings: $COUNT"
          if [ "$COUNT" -gt "$CODACY_FINDINGS_THRESHOLD" ]; then
            echo "::error::Codacy findings ($COUNT) exceed threshold ($CODACY_FINDINGS_THRESHOLD). Bitte Findings beheben."
            exit 1
          else
            echo "::notice::Codacy findings: $COUNT (Threshold: $CODACY_FINDINGS_THRESHOLD) — OK"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Codacy SARIF Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Findings: ${{ steps.gate.outputs.findings }}" >> $GITHUB_STEP_SUMMARY
