name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: staging
        type: choice
        options:
          - staging

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.12'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Run lint checks
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit -- --run

      - name: Build workspaces
        run: npm run build:workspaces

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build-and-test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit (critical only)
        # --audit-level=high blockiert bei transitiven Dependencies mit false-positives.
        # Nur CRITICAL blockiert hier; HIGH wird in security-scan.yml separat gemeldet.
        # --omit=dev: dev-only Vulnerabilities sind in Production nicht relevant.
        run: npm audit --audit-level=critical --omit=dev

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.34.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          sarif_file: trivy-fs.sarif

      # Gitleaks: Wird vom dedizierten gitleaks.yml mit .gitleaks.toml-Config übernommen.
      # Hier entfernt, um doppelte Ausführung und widersprüchliche Ergebnisse zu vermeiden.

  container-build:
    name: Container Build
    runs-on: ubuntu-latest
    needs: [security-scan]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: false
          load: true
          tags: menschlichkeit-oesterreich-development:ci

  sbom-export:
    name: SBOM Export
    runs-on: ubuntu-latest
    needs: [container-build]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json

  deploy-staging:
    name: Staging Deploy
    runs-on: ubuntu-latest
    needs: [sbom-export]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'
    environment:
      name: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to staging via webhook
        env:
          STAGING_DEPLOY_WEBHOOK: ${{ secrets.STAGING_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$STAGING_DEPLOY_WEBHOOK" ]; then
            echo "STAGING_DEPLOY_WEBHOOK is not configured" >&2
            exit 1
          fi
          curl --fail --show-error --silent \
            -X POST "$STAGING_DEPLOY_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d '{"repository":"${{ github.repository }}","sha":"${{ github.sha }}","ref":"${{ github.ref_name }}"}'
