name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: staging
        type: choice
        options:
          - staging

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.12'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Install API test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/api/requirements-dev.txt

      - name: Run lint checks
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit -- --run

      - name: Run website tests
        run: npm run test:website

      - name: Run API tests
        run: npm run test:api

      - name: Collect website coverage
        run: npm run test:website:coverage

      - name: Collect games coverage
        run: npm run test:games:coverage

      - name: Collect API coverage
        run: npm run test:api:coverage

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          if-no-files-found: error
          path: |
            apps/website/coverage/coverage-summary.json
            apps/website/coverage/lcov.info
            apps/babylon-game/coverage/coverage-summary.json
            apps/babylon-game/coverage/lcov.info
            quality-reports/api-coverage.xml

      - name: Upload coverage to Codecov
        if: env.CODECOV_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: apps/website/coverage/lcov.info,apps/babylon-game/coverage/lcov.info,quality-reports/api-coverage.xml
          flags: website,games,api
          fail_ci_if_error: false
          verbose: true

      - name: Build workspaces
        run: npm run build:workspaces

      - name: Dependency audit (critical only)
        # --omit=dev: dev-only Vulnerabilities sind in Production nicht relevant.
        # HIGH wird durch dependency-review.yml (PR-Gate) und osv-scanner.yml (Nightly) abgedeckt.
        run: npm audit --audit-level=critical --omit=dev

  container-build:
    name: Container Build (API)
    runs-on: ubuntu-latest
    needs: [build-and-test]
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Detect API container changes
        id: api_changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
            CHANGED_FILES="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
          elif [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            CHANGED_FILES="$(git diff --name-only "${{ github.event.before }}...${{ github.sha }}")"
          else
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "Kein Vergleichs-SHA vorhanden. API-Container wird vorsorglich gebaut." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "Geänderte Dateien:"
          echo "${CHANGED_FILES}"

          if echo "${CHANGED_FILES}" | grep -Eq '^(apps/api/|\.github/workflows/ci\.yml|docker-compose|pyproject\.toml|scripts/start-api-dev\.sh)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "API-/Docker-relevante Änderungen erkannt. Container-Build wird ausgeführt." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "Keine API-/Docker-relevanten Änderungen erkannt. Container-Build wird übersprungen." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Set up Docker Buildx
        if: steps.api_changes.outputs.relevant == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        if: steps.api_changes.outputs.relevant == 'true'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v6.14.0
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: false
          load: true
          tags: menschlichkeit-oesterreich:ci

  e2e-phase1:
    name: E2E Phase 1 (Chromium)
    runs-on: ubuntu-latest
    needs: [build-and-test]
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run phase-1 e2e suite (chromium)
        env:
          FRONTEND_URL: http://localhost:5173
        run: |
          npx playwright test \
            tests/e2e/authentication.spec.ts \
            tests/e2e/signup.spec.ts \
            tests/e2e/donation-flow.spec.ts \
            tests/e2e/member-operations.spec.ts \
            --project=chromium \
            --reporter=list

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-phase1-results
          if-no-files-found: warn
          path: playwright-results/

  deploy-staging:
    name: Staging Deploy
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'
    environment:
      name: staging
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Deploy to staging via webhook
        env:
          STAGING_DEPLOY_WEBHOOK: ${{ secrets.STAGING_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$STAGING_DEPLOY_WEBHOOK" ]; then
            echo "STAGING_DEPLOY_WEBHOOK ist nicht konfiguriert." >&2
            exit 1
          fi
          curl --fail --show-error --silent \
            -X POST "$STAGING_DEPLOY_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d '{"repository":"${{ github.repository }}","sha":"${{ github.sha }}","ref":"${{ github.ref_name }}"}'
