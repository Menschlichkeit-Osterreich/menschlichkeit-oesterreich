# ============================================================
# ONE-TIME WORKFLOW: Mirror GitHub Secrets → Bitwarden Secrets Manager
# ============================================================
# SECURITY: This workflow runs ONCE, then must be DELETED.
# It reads existing GitHub Secrets and writes them to BSM vault
# using the Bitwarden SDK Python package.
# After successful run: delete this file and force-push.
# ============================================================

name: 'Mirror Secrets to BSM (ONE-TIME)'

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (only show what would be written, no actual writes)'
        type: boolean
        default: true
      confirm_delete:
        description: 'I confirm this workflow will be deleted after use'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  mirror-secrets:
    name: Mirror GH Secrets to BSM
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm_delete == 'true' }}

    steps:
      - name: Install Bitwarden SDK
        run: pip install bitwarden-sdk

      - name: Mirror secrets to BSM
        env:
          BW_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
          # === Infra secrets ===
          GH_PLESK_SSH_PRIVATE_KEY: ${{ secrets.PLESK_SSH_PRIVATE_KEY }}
          GH_PLESK_KNOWN_HOSTS: ${{ secrets.PLESK_KNOWN_HOSTS }}
          GH_PLESK_HOST: ${{ secrets.PLESK_HOST }}
          GH_PLESK_USER: ${{ secrets.PLESK_USER }}
          GH_PLESK_PORT: ${{ secrets.PLESK_PORT }}
          # === API secrets ===
          GH_JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          # === N8N secrets ===
          GH_N8N_PASSWORD: ${{ secrets.N8N_BASIC_AUTH_PASSWORD }}
          # === Workflow config ===
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          python3 << 'PYEOF'
          import os
          import json

          try:
              from bitwarden_sdk import BitwardenClient, DeviceType, client_settings_from_dict
          except ImportError:
              # Fallback for older SDK versions
              from bitwarden_sdk import BitwardenClient

          access_token = os.environ["BW_ACCESS_TOKEN"]
          dry_run = os.environ.get("DRY_RUN", "true") == "true"

          # UUID → (env_var_name, description)
          MAPPING = {
              "4e25e106-c135-4bd4-aedd-b4190148c30a": ("GH_PLESK_SSH_PRIVATE_KEY", "infra/SSH_PRIVATE_KEY"),
              "589b4084-5e43-4297-8552-b4190148c37b": ("GH_PLESK_KNOWN_HOSTS", "infra/SSH_KNOWN_HOSTS"),
              "25a0c6ba-4bd7-4929-bffb-b4190148c3e2": ("GH_PLESK_HOST", "infra/PLESK_HOST"),
              "54bdf5f3-31ca-4914-a800-b4190148c44b": ("GH_PLESK_USER", "infra/PLESK_USER"),
              "22880ae2-dc7d-479b-ac55-b4190148c4b7": ("GH_PLESK_PORT", "infra/PLESK_PORT"),
              "eb662caa-141c-4a97-8e56-b4190148d80f": ("GH_JWT_SECRET_KEY", "api/JWT_SECRET_KEY"),
              "c0199837-8096-4f98-b219-b4190148dc00": ("GH_N8N_PASSWORD", "n8n/N8N_PASSWORD"),
          }

          print("=== Mirror GitHub Secrets → Bitwarden SM ===")
          print(f"Mode: {'DRY RUN' if dry_run else 'LIVE WRITE'}")
          print(f"Secrets to process: {len(MAPPING)}")
          print()

          success = 0
          skipped = 0
          failed = 0

          if not dry_run:
              try:
                  settings = client_settings_from_dict({
                      "apiUrl": "https://api.bitwarden.eu",
                      "identityUrl": "https://identity.bitwarden.eu",
                      "deviceType": "SDK",
                      "userAgent": "gh-actions-mirror",
                  })
                  client = BitwardenClient(settings)
                  client.access_token_login(access_token)
                  print("Authenticated with BSM successfully")
              except Exception as e:
                  print(f"::error::Failed to authenticate with BSM: {e}")
                  # Fallback: try subprocess with bws if available
                  client = None

          for uuid, (env_var, bsm_key) in MAPPING.items():
              value = os.environ.get(env_var, "")

              if not value or value == "***":
                  print(f"SKIP: {bsm_key} ({env_var} is empty or masked)")
                  skipped += 1
                  continue

              # Mask value in GitHub Actions logs
              print(f"::add-mask::{value}")
              value_len = len(value)

              if dry_run:
                  print(f"DRY RUN: Would write {bsm_key} ({value_len} chars) -> UUID {uuid}")
                  success += 1
              else:
                  try:
                      if client:
                          client.secrets().update(
                              id=uuid,
                              key=bsm_key,
                              value=value,
                              note=f"Mirrored from GitHub Secret {env_var}",
                              organization_id="4497a240-0879-414c-ae90-b386001dbf56",
                          )
                      else:
                          import subprocess
                          result = subprocess.run(
                              ["bws", "secret", "edit", uuid,
                               "--value", value,
                               "--access-token", access_token,
                               "--server-url", "https://vault.bitwarden.eu"],
                              capture_output=True, text=True, timeout=30
                          )
                          if result.returncode != 0:
                              raise Exception(result.stderr)

                      print(f"OK: {bsm_key} ({value_len} chars)")
                      success += 1
                  except Exception as e:
                      print(f"FAIL: {bsm_key} - {e}")
                      failed += 1

          print()
          print("=== Summary ===")
          print(f"Success: {success}")
          print(f"Skipped: {skipped}")
          print(f"Failed:  {failed}")

          if failed > 0:
              print(f"::error::{failed} secrets failed to write")
              exit(1)
          PYEOF

      - name: Post-run reminder
        if: always()
        run: |
          echo "=================================================="
          echo "IMPORTANT: DELETE THIS WORKFLOW FILE NOW!"
          echo "File: .github/workflows/one-time-mirror-secrets-to-bsm.yml"
          echo "=================================================="
