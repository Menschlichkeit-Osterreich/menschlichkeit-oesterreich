# ONE-TIME WORKFLOW: Mirror GitHub Secrets → Bitwarden Secrets Manager
# Run ONCE, then DELETE this file.

name: 'Mirror Secrets to BSM (ONE-TIME)'

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (show what would be written)'
        type: boolean
        default: true
      confirm_delete:
        description: 'I confirm this workflow will be deleted after use'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  mirror-secrets:
    name: Mirror GH Secrets to BSM
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm_delete == 'true' }}

    steps:
      - name: Install Bitwarden SDK
        run: pip install bitwarden-sdk==2.0.0

      - name: Mirror secrets via Python SDK
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
          SEC_PLESK_SSH_PRIVATE_KEY: ${{ secrets.PLESK_SSH_PRIVATE_KEY }}
          SEC_PLESK_KNOWN_HOSTS: ${{ secrets.PLESK_KNOWN_HOSTS }}
          SEC_PLESK_HOST: ${{ secrets.PLESK_HOST }}
          SEC_PLESK_USER: ${{ secrets.PLESK_USER }}
          SEC_PLESK_PORT: ${{ secrets.PLESK_PORT }}
          SEC_JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          SEC_N8N_PASSWORD: ${{ secrets.N8N_BASIC_AUTH_PASSWORD }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          python3 << 'PYEOF'
          import os, sys

          from bitwarden_sdk import BitwardenClient
          from bitwarden_sdk.schemas import ClientSettings

          from uuid import UUID

          access_token = os.environ["BWS_ACCESS_TOKEN"]
          dry_run = os.environ.get("DRY_RUN", "true") == "true"
          org_id = "4497a240-0879-414c-ae90-b386001dbf56"
          project_id = UUID("9bf8d744-58fd-4bca-8459-b386001f3d06")

          MAPPING = [
              ("4e25e106-c135-4bd4-aedd-b4190148c30a", "SEC_PLESK_SSH_PRIVATE_KEY", "infra/SSH_PRIVATE_KEY"),
              ("589b4084-5e43-4297-8552-b4190148c37b", "SEC_PLESK_KNOWN_HOSTS", "infra/SSH_KNOWN_HOSTS"),
              ("25a0c6ba-4bd7-4929-bffb-b4190148c3e2", "SEC_PLESK_HOST", "infra/PLESK_HOST"),
              ("54bdf5f3-31ca-4914-a800-b4190148c44b", "SEC_PLESK_USER", "infra/PLESK_USER"),
              ("22880ae2-dc7d-479b-ac55-b4190148c4b7", "SEC_PLESK_PORT", "infra/PLESK_PORT"),
              ("eb662caa-141c-4a97-8e56-b4190148d80f", "SEC_JWT_SECRET_KEY", "api/JWT_SECRET_KEY"),
              ("c0199837-8096-4f98-b219-b4190148dc00", "SEC_N8N_PASSWORD", "n8n/N8N_PASSWORD"),
          ]

          print(f"=== Mirror GitHub Secrets -> BSM ===")
          print(f"Mode: {'DRY RUN' if dry_run else 'LIVE WRITE'}")
          print(f"Secrets: {len(MAPPING)}")
          print()

          success = skipped = failed = 0

          # Authenticate with BSM
          if not dry_run:
              try:
                  settings = ClientSettings(
                      api_url="https://api.bitwarden.eu",
                      identity_url="https://identity.bitwarden.eu",
                  )
                  client = BitwardenClient(settings)
                  client.auth().login_access_token(access_token)
                  print("Authenticated with BSM")
              except Exception as e:
                  print(f"::error::Auth failed: {e}")
                  sys.exit(1)

          for uuid, env_var, bsm_key in MAPPING:
              value = os.environ.get(env_var, "")

              if not value:
                  print(f"SKIP: {bsm_key} ({env_var} empty)")
                  skipped += 1
                  continue

              # Mask each line in GH Actions logs
              for line in value.split("\n"):
                  if line.strip():
                      print(f"::add-mask::{line.strip()}")

              val_len = len(value)

              if dry_run:
                  print(f"DRY RUN: {bsm_key} ({val_len} chars) -> {uuid}")
                  success += 1
              else:
                  try:
                      client.secrets().update(
                          organization_id=org_id,
                          id=uuid,
                          key=bsm_key,
                          value=value,
                          note=f"Mirrored from GH Secret {env_var}",
                          project_ids=[project_id],
                      )
                      print(f"OK: {bsm_key} ({val_len} chars)")
                      success += 1
                  except Exception as e:
                      print(f"::error::FAIL: {bsm_key} - {e}")
                      failed += 1

          print()
          print(f"=== Summary: {success} ok, {skipped} skipped, {failed} failed ===")
          sys.exit(1 if failed > 0 else 0)
          PYEOF

      - name: Post-run reminder
        if: always()
        run: echo "DELETE .github/workflows/one-time-mirror-secrets-to-bsm.yml NOW"
