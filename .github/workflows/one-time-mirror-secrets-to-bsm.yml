# ONE-TIME WORKFLOW: Mirror GitHub Secrets → Bitwarden Secrets Manager
# SECURITY: Run ONCE, then DELETE this file.

name: 'Mirror Secrets to BSM (ONE-TIME)'

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (show what would be written)'
        type: boolean
        default: true
      confirm_delete:
        description: 'I confirm this workflow will be deleted after use'
        type: boolean
        default: false

permissions:
  contents: read

env:
  BWS_SERVER_URL: https://vault.bitwarden.eu

jobs:
  mirror-secrets:
    name: Mirror GH Secrets to BSM
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm_delete == 'true' }}

    steps:
      - name: Install bws CLI
        run: |
          BWS_VERSION="1.0.0"
          curl -fsSL "https://github.com/bitwarden/sdk/releases/download/bws-v${BWS_VERSION}/bws-x86_64-unknown-linux-gnu-${BWS_VERSION}.zip" -o bws.zip
          unzip -o bws.zip -d /usr/local/bin/
          chmod +x /usr/local/bin/bws
          bws --version

      - name: Mirror secrets
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          DRY_RUN="${{ github.event.inputs.dry_run }}"
          SUCCESS=0; SKIPPED=0; FAILED=0

          mirror_secret() {
            local UUID="$1" ENV_VAR="$2" BSM_KEY="$3" VALUE="$4"

            if [ -z "$VALUE" ]; then
              echo "SKIP: $BSM_KEY ($ENV_VAR is empty)"
              ((SKIPPED++))
              return
            fi

            echo "::add-mask::$VALUE"
            local LEN=${#VALUE}

            if [ "$DRY_RUN" = "true" ]; then
              echo "DRY RUN: $BSM_KEY ($LEN chars) -> $UUID"
              ((SUCCESS++))
            else
              if bws secret edit "$UUID" --value "$VALUE" \
                --access-token "$BWS_ACCESS_TOKEN" \
                --server-url "$BWS_SERVER_URL" > /dev/null 2>&1; then
                echo "OK: $BSM_KEY ($LEN chars)"
                ((SUCCESS++))
              else
                echo "::error::FAIL: $BSM_KEY"
                ((FAILED++))
              fi
            fi
          }

          echo "=== Mirror GitHub Secrets -> BSM ==="
          echo "Mode: $([ "$DRY_RUN" = 'true' ] && echo 'DRY RUN' || echo 'LIVE')"
          echo ""

          # Infra
          mirror_secret "4e25e106-c135-4bd4-aedd-b4190148c30a" "PLESK_SSH_PRIVATE_KEY" "infra/SSH_PRIVATE_KEY" "${{ secrets.PLESK_SSH_PRIVATE_KEY }}"
          mirror_secret "589b4084-5e43-4297-8552-b4190148c37b" "PLESK_KNOWN_HOSTS" "infra/SSH_KNOWN_HOSTS" "${{ secrets.PLESK_KNOWN_HOSTS }}"
          mirror_secret "25a0c6ba-4bd7-4929-bffb-b4190148c3e2" "PLESK_HOST" "infra/PLESK_HOST" "${{ secrets.PLESK_HOST }}"
          mirror_secret "54bdf5f3-31ca-4914-a800-b4190148c44b" "PLESK_USER" "infra/PLESK_USER" "${{ secrets.PLESK_USER }}"
          mirror_secret "22880ae2-dc7d-479b-ac55-b4190148c4b7" "PLESK_PORT" "infra/PLESK_PORT" "${{ secrets.PLESK_PORT }}"

          # API
          mirror_secret "eb662caa-141c-4a97-8e56-b4190148d80f" "JWT_SECRET_KEY" "api/JWT_SECRET_KEY" "${{ secrets.JWT_SECRET_KEY }}"

          # N8N
          mirror_secret "c0199837-8096-4f98-b219-b4190148dc00" "N8N_BASIC_AUTH_PASSWORD" "n8n/N8N_PASSWORD" "${{ secrets.N8N_BASIC_AUTH_PASSWORD }}"

          echo ""
          echo "=== Summary ==="
          echo "Success: $SUCCESS | Skipped: $SKIPPED | Failed: $FAILED"

          [ "$FAILED" -gt 0 ] && exit 1 || true

      - name: Post-run reminder
        if: always()
        run: echo "DELETE .github/workflows/one-time-mirror-secrets-to-bsm.yml NOW"
