name: CodeQL

on:
  push:
    branches: [main, develop, chore/**, feature/**]
    paths:
      - 'apps/website/**'
      - 'apps/api/**'
      - 'apps/crm/**'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/website/**'
      - 'apps/api/**'
      - 'apps/crm/**'
      - '.github/workflows/codeql.yml'
  schedule:
    # Nightly CodeQL-Scan (01:00 UTC) – unabhängig von Push-Pfad-Filtern
    - cron: '0 1 * * *'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Analyse (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: [javascript, python]
        # javascript deckt auch TypeScript ab (selber Analyzer).
        # python deckt apps/api/ ab.
        # php würde autobuild benötigen und erhöht Laufzeit; CodeQL-php ist optional.

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v3.28.1
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v3.28.1
        with:
          category: '/language:${{ matrix.language }}'
