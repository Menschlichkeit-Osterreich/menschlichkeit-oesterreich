name: BSM Env Inject
description: Laedt BSM-Secrets fuer ein Profil und injiziert sie maskiert in die aktuelle Job-Umgebung.

inputs:
  profile:
    description: Secret-Profil aus .github/bsm-secret-ids.json
    required: true
  access_token:
    description: Bitwarden Secrets Manager Access Token
    required: true

outputs:
  injected:
    description: Profilname der erfolgreich injizierten Secret-Gruppe
    value: ${{ steps.inject.outputs.injected }}

runs:
  using: composite
  steps:
    - name: BSM laden + GITHUB_ENV befuellen
      id: inject
      shell: bash
      env:
        BW_ACCESS_TOKEN: ${{ inputs.access_token }}
        BSM_PROFILE: ${{ inputs.profile }}
      run: |
        set -euo pipefail

        MAP_FILE=".github/bsm-secret-ids.json"
        if [ ! -f "$MAP_FILE" ]; then
          echo "✗ Mapping-Datei fehlt: $MAP_FILE"
          exit 1
        fi

        if [ -z "${BW_ACCESS_TOKEN:-}" ]; then
          echo "✗ BW_ACCESS_TOKEN fehlt"
          exit 1
        fi

        if ! command -v jq >/dev/null 2>&1; then
          echo "✗ jq fehlt auf Runner"
          exit 1
        fi

        if [ "$(jq -r --arg profile "$BSM_PROFILE" 'has("profiles") and (.profiles | has($profile))' "$MAP_FILE")" != "true" ]; then
          echo "✗ Profil '$BSM_PROFILE' fehlt in $MAP_FILE"
          exit 1
        fi

        fetch_secret_value() {
          local uuid="$1"
          local json=""
          local value=""

          if command -v bws >/dev/null 2>&1; then
            if ! json=$(BWS_ACCESS_TOKEN="$BW_ACCESS_TOKEN" bws secret get "$uuid" --output json --server-url https://vault.bitwarden.eu); then
              echo "✗ BSM-Abfrage fehlgeschlagen (bws) fuer UUID ${uuid}"
              exit 1
            fi
          elif command -v docker >/dev/null 2>&1; then
            if ! json=$(docker run --rm -e "BWS_ACCESS_TOKEN=$BW_ACCESS_TOKEN" ghcr.io/bitwarden/bws secret get "$uuid" --output json --server-url https://vault.bitwarden.eu); then
              echo "✗ BSM-Abfrage fehlgeschlagen (docker-bws) fuer UUID ${uuid}"
              exit 1
            fi
          else
            echo "✗ Weder bws noch Docker verfuegbar"
            exit 1
          fi

          value=$(printf '%s' "$json" | jq -r '.value // empty')
          if [ -z "$value" ] || [ "$value" = "null" ]; then
            echo "✗ BSM-Secret leer oder nicht gefunden fuer UUID ${uuid}"
            exit 1
          fi

          printf '%s' "$value"
        }

        write_multiline_env() {
          local key="$1"
          local value="$2"
          local delim="EOF_$(date +%s)_$RANDOM"
          {
            printf '%s<<%s\n' "$key" "$delim"
            printf '%s\n' "$value"
            printf '%s\n' "$delim"
          } >> "$GITHUB_ENV"
        }

        mapfile -t secret_rows < <(jq -r --arg profile "$BSM_PROFILE" '.profiles[$profile].secrets[]? | @base64' "$MAP_FILE")

        if [ "${#secret_rows[@]}" -eq 0 ]; then
          echo "✗ Profil '$BSM_PROFILE' enthält keine Secrets"
          exit 1
        fi

        injected_names=()
        secret_objects_file="$(mktemp)"

        for row in "${secret_rows[@]}"; do
          entry_json=$(printf '%s' "$row" | base64 --decode)
          env_var=$(printf '%s' "$entry_json" | jq -r '.env_var // empty')
          uuid=$(printf '%s' "$entry_json" | jq -r '.uuid // empty')

          if [ -z "$env_var" ]; then
            echo "✗ Profil '$BSM_PROFILE' enthält Secret ohne env_var"
            exit 1
          fi

          if [ -z "$uuid" ] || [ "$uuid" = "null" ]; then
            echo "✗ Secret '$env_var' hat keine UUID im Profil '$BSM_PROFILE'"
            exit 1
          fi

          if [[ "$uuid" == "UPDATE_VALUE_IN_VAULT" || "$uuid" == PLACEHOLDER_* ]]; then
            echo "✗ Secret '$env_var' hat Platzhalter-UUID im Profil '$BSM_PROFILE'"
            exit 1
          fi

          value=$(fetch_secret_value "$uuid")
          if [ -z "$value" ]; then
            echo "✗ Secret '$env_var' ist leer im Profil '$BSM_PROFILE'"
            exit 1
          fi

          echo "::add-mask::${value}"
          write_multiline_env "$env_var" "$value"
          printf '{"%s":%s}\n' "$env_var" "$(printf '%s' "$value" | jq -Rs '.')" >> "$secret_objects_file"
          injected_names+=("$env_var")
        done

        secrets_json=$(jq -sc 'add // {}' "$secret_objects_file")
        if [ "$BSM_PROFILE" = "deploy-production" ]; then
          required_keys=(
            DATABASE_URL
            JWT_SECRET_KEY
            STRIPE_SECRET_KEY
            STRIPE_WEBHOOK_SECRET
            MOE_API_TOKEN
            N8N_WEBHOOK_SECRET
            CIVICRM_SITE_KEY
            CIVICRM_API_KEY
            ALERTS_SLACK_WEBHOOK
            MICROSOFT_TENANT_ID
            MICROSOFT_CLIENT_ID
            MICROSOFT_CLIENT_SECRET
            MICROSOFT_GRAPH_SENDER
          )

          for required_key in "${required_keys[@]}"; do
            required_value=$(printf '%s' "$secrets_json" | jq -r --arg key "$required_key" '.[$key] // empty')
            if [ -z "$required_value" ]; then
              echo "✗ Pflicht-Secret '$required_key' fehlt im Profil '$BSM_PROFILE'"
              exit 1
            fi
          done
        fi

        injected_csv=""
        for name in "${injected_names[@]}"; do
          if [ -z "$injected_csv" ]; then
            injected_csv="$name"
          else
            injected_csv="$injected_csv,$name"
          fi
        done

        echo "injected=${injected_csv}" >> "$GITHUB_OUTPUT"

        echo "### 🔐 BSM Secret Injection" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Profil:** \`${BSM_PROFILE}\`" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Quelle:** Bitwarden Secrets Manager (bws + UUID-Mapping)" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Handoff:** ueber GITHUB_ENV im aktuellen Job" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Geladene Keys:** ${injected_csv}" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Status:** ✅ Erfolgreich" >> "$GITHUB_STEP_SUMMARY"
