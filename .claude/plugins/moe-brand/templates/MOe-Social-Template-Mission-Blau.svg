<!-- Menschlichkeit Österreich – Social Media Template: Mission (Blau)
     Format: Instagram Feed 1080×1350px (4:5)
     Anleitung: Headline und Subline-Text ersetzen. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@800&amp;family=Source+Sans+3:wght@400;600&amp;display=swap');
    </style>
  </defs>

  <!-- Hintergrund: Demokratie-Blau -->
  <rect width="1080" height="1350" fill="#1B4965"/>

  <!-- Dezenter Akzentstreifen oben -->
  <rect x="0" y="0" width="1080" height="6" fill="#B54A0F"/>

  <!-- Headline -->
  <text x="80" y="420" font-family="'Nunito Sans', sans-serif" font-weight="800" font-size="72" fill="#FFFFFF" letter-spacing="-0.5">
    <tspan x="80" dy="0">[Headline hier</tspan>
    <tspan x="80" dy="90">einfügen]</tspan>
  </text>

  <!-- Trennlinie -->
  <rect x="80" y="560" width="80" height="6" rx="3" fill="#B54A0F"/>

  <!-- Subline -->
  <text x="80" y="630" font-family="'Source Sans 3', sans-serif" font-weight="400" font-size="36" fill="rgba(255,255,255,0.85)">
    <tspan x="80" dy="0">[Beschreibungstext hier einfügen.</tspan>
    <tspan x="80" dy="48">Maximal 2-3 Zeilen.]</tspan>
  </text>

  <!-- Website-URL Footer -->
  <rect x="0" y="1260" width="1080" height="90" fill="rgba(0,0,0,0.15)"/>
  <text x="80" y="1315" font-family="'Source Sans 3', sans-serif" font-weight="600" font-size="24" fill="rgba(255,255,255,0.7)">
    menschlichkeit-oesterreich.at
  </text>

  <!-- Logo-Platzhalter unten rechts (Baum-Icon weiß) -->
  <g transform="translate(940, 1270) scale(0.5)">
    <!-- Vereinfachter Baum-Platzhalter -->
    <circle cx="60" cy="30" r="28" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
    <text x="60" y="40" text-anchor="middle" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,0.6)">MOe</text>
  </g>

  <!-- Kategorie-Label -->
  <rect x="80" y="80" width="140" height="40" rx="20" fill="#B54A0F"/>
  <text x="150" y="107" text-anchor="middle" font-family="'Source Sans 3', sans-serif" font-weight="700" font-size="18" fill="#FFFFFF">
    MISSION
  </text>
</svg>
