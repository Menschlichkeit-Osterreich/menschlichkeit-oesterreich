; =============================================================
; PHP 8.3 Konfiguration — phpBB Optimiert
; Menschlichkeit Österreich Forum
; =============================================================

; ── OPcache (maximale Performance) ──────────────────────────
[opcache]
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 60
; Produktion: opcache.validate_timestamps = 0
opcache.validate_timestamps = 1
opcache.fast_shutdown = 1
opcache.save_comments = 1
opcache.jit = tracing
opcache.jit_buffer_size = 64M

; ── Redis Sessions (DB 1, getrennt von App DB 0 und Cache DB 2) ─
[Session]
session.save_handler = redis
session.save_path = "tcp://${PHPBB_REDIS_HOST}:${PHPBB_REDIS_PORT}?database=1&prefix=phpbb_sess_"
session.gc_maxlifetime = 7200
session.cookie_httponly = 1
session.cookie_secure = 0
; Produktion: session.cookie_secure = 1
session.cookie_samesite = Lax
session.use_strict_mode = 1

; ── Upload & Memory Limits ──────────────────────────────────
[PHP]
memory_limit = 256M
upload_max_filesize = 16M
post_max_size = 16M
max_execution_time = 60
max_input_time = 60
max_input_vars = 5000

; ── Zeitzone & Encoding ─────────────────────────────────────
date.timezone = Europe/Vienna
default_charset = "UTF-8"
mbstring.internal_encoding = "UTF-8"

; ── Sicherheit (gehärtet) ───────────────────────────────────
expose_php = Off
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /proc/self/fd/2
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Dateisystem-Isolation: nur phpBB-Verzeichnis + tmp zugänglich
open_basedir = /var/www/phpbb:/tmp:/proc/self/fd
; Upload-Verzeichnis isolieren
upload_tmp_dir = /tmp/phpbb_uploads
; Dynamisches Laden von Extensions verbieten
enable_dl = Off
; Remote-Includes verbieten (Code-Injection-Prävention)
allow_url_include = Off
allow_url_fopen = On

; Gefährliche Funktionen deaktivieren (phpBB braucht diese nicht)
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,parse_ini_file,show_source,dl,pcntl_exec,pcntl_fork,pcntl_signal

; Serialize-Handler härten
session.serialize_handler = php_serialize
; Cookie-Prefix für Multi-App (verhindert Cookie-Kollisionen)
session.name = PHPBB_SESSID

; ── Realpath-Cache (Performance) ────────────────────────────
realpath_cache_size = 4096k
realpath_cache_ttl = 600

; ── Output-Buffering (Performance) ──────────────────────────
output_buffering = 4096
zlib.output_compression = On
zlib.output_compression_level = 6
