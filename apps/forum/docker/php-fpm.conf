; =============================================================
; PHP-FPM Pool — phpBB Optimiert
; Menschlichkeit Österreich Forum
; =============================================================

[www]
; Dynamischer Pool — skaliert mit Last
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 1000

; Slow-Log für Performance-Debugging
slowlog = /proc/self/fd/2
request_slowlog_timeout = 10s

; Timeouts
request_terminate_timeout = 60s

; Prozess-Management
pm.process_idle_timeout = 10s

; Status-Seite (nur intern erreichbar)
pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong

; Logging
catch_workers_output = yes
decorate_workers_output = no

; Sicherheit: nur .php ausführen
security.limit_extensions = .php

; Umgebungsvariablen durchreichen (für config.php getenv())
clear_env = no

; Fork-Bomb-Schutz: max. 5 Prozesse gleichzeitig starten
pm.max_spawn_rate = 5

; Connection-Backlog (Warteschlange bei Lastspitzen)
listen.backlog = 1024

; Zugriffslog für Debugging (deaktivieren in Produktion)
; access.log = /proc/self/fd/2
; access.format = "%R - %u %t \"%m %r%Q%q\" %s %f %{mili}d %{kilo}M %C%%"
