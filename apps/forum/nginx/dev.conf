# =============================================================
# Nginx Dev-Config — phpBB Forum (Port 8002)
# Menschlichkeit Österreich
# =============================================================

server {
    listen 80;
    server_name localhost;

    root /var/www/phpbb;
    index app.php index.php;

    client_max_body_size 16M;

    # phpBB URL-Rewriting
    location / {
        try_files $uri $uri/ /app.php?$query_string;
    }

    # phpBB Installer (nur für Erstinstallation — danach /install/ entfernen)
    location /install/ {
        try_files $uri $uri/ /install/app.php?$query_string;
    }

    # Sensible phpBB-Verzeichnisse blockieren
    location ~ /(config\.php|common\.php) {
        deny all;
    }

    location ~ ^/(cache|store|vendor|includes)/ {
        deny all;
        internal;
    }

    location ~ ^/images/avatars/upload/ {
        deny all;
        internal;
    }

    # PHP-Verarbeitung via FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass phpbb-fpm:9000;
        fastcgi_index app.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        include fastcgi_params;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 60s;
    }

    # Statische Assets — Caching
    location ~* \.(?:css|js|jpg|jpeg|gif|png|webp|svg|ico|woff|woff2|ttf|eot)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
    }

    # Gzip-Kompression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
    gzip_vary on;

    # FPM Health-Check (intern)
    location = /fpm-ping {
        fastcgi_pass phpbb-fpm:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        access_log off;
    }
}
