# =============================================================
# Nginx Produktion — phpBB Forum
# forum.menschlichkeit-oesterreich.at
# Gehärtet: Rate-Limiting, Timeouts, Security Headers
# =============================================================

# ── Rate-Limiting Zonen ──────────────────────────────────────
# Allgemein: 10 Requests/Sekunde pro IP
limit_req_zone $binary_remote_addr zone=forum_general:10m rate=10r/s;
# Login/Registrierung: 3 Requests/Sekunde pro IP (Brute-Force-Schutz)
limit_req_zone $binary_remote_addr zone=forum_auth:5m rate=3r/s;
# Suche: 2 Requests/Sekunde (ressourcenintensiv)
limit_req_zone $binary_remote_addr zone=forum_search:5m rate=2r/s;

server {
    listen 80;
    server_name forum.menschlichkeit-oesterreich.at;
    server_tokens off;
    # nosemgrep: nginx-host-header-injection -- redirect target uses hardcoded hostname, not $host/$http_host
    return 301 https://forum.menschlichkeit-oesterreich.at$request_uri;
}

server {
    listen 443 ssl http2;
    server_name forum.menschlichkeit-oesterreich.at;
    server_tokens off;

    include /etc/nginx/snippets/moe-tls.conf;

    # ── Security Headers ─────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://img.youtube.com https://i.vimeocdn.com; script-src 'self' 'unsafe-inline' https://newassets.hcaptcha.com https://js.hcaptcha.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-src https://www.youtube.com https://player.vimeo.com https://newassets.hcaptcha.com; connect-src 'self' https://api.hcaptcha.com" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header X-XSS-Protection "1; mode=block" always;

    root /var/www/phpbb;
    index app.php index.php;

    # ── Request-Limits ───────────────────────────────────────
    client_max_body_size 16M;
    client_body_timeout 30s;
    client_header_timeout 15s;
    send_timeout 30s;
    keepalive_timeout 65s;
    keepalive_requests 100;

    # ── Allgemeines Rate-Limiting ────────────────────────────
    limit_req zone=forum_general burst=20 nodelay;
    limit_req_status 429;

    # ── phpBB URL-Rewriting ──────────────────────────────────
    location / {
        try_files $uri $uri/ /app.php?$query_string;
    }

    # ── Login/Registrierung Rate-Limiting (Brute-Force) ──────
    location ~ ^/ucp\.php {
        limit_req zone=forum_auth burst=5 nodelay;
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include snippets/fastcgi-php.conf;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_connect_timeout 10s;
        fastcgi_send_timeout 30s;
        fastcgi_read_timeout 60s;
    }

    # ── Suche Rate-Limiting ──────────────────────────────────
    location ~ ^/search\.php {
        limit_req zone=forum_search burst=3 nodelay;
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include snippets/fastcgi-php.conf;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_connect_timeout 10s;
        fastcgi_send_timeout 30s;
        fastcgi_read_timeout 120s;
    }

    # ── Sensible Dateien/Verzeichnisse blockieren ────────────
    location ~ /(config\.php|common\.php) {
        deny all;
    }

    location ~ ^/(cache|store|vendor|includes|install)/ {
        deny all;
        internal;
    }

    location ~ ^/images/avatars/upload/ {
        deny all;
        internal;
    }

    location ~* \.(?:htaccess|log|ini|php\.save|php~|bak|orig|sql|gz|tar)$ {
        deny all;
    }

    # ── PHP-FPM ──────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include snippets/fastcgi-php.conf;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_connect_timeout 10s;
        fastcgi_send_timeout 30s;
        fastcgi_read_timeout 60s;
    }

    # ── Statische Assets (30 Tage Cache + ETag) ──────────────
    location ~* \.(?:css|js|jpg|jpeg|gif|png|webp|svg|ico|woff|woff2|ttf|eot|avif)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        etag on;
        open_file_cache max=1000 inactive=20s;
        open_file_cache_valid 30s;
        open_file_cache_min_uses 2;
        open_file_cache_errors on;
    }

    # ── Gzip-Kompression ─────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_proxied any;

    # ── Logging ──────────────────────────────────────────────
    access_log /var/log/nginx/forum_access.log main;
    error_log  /var/log/nginx/forum_error.log warn;

    # ── Fehlerseiten ─────────────────────────────────────────
    error_page 404 /app.php;
    error_page 429 /429.html;
    error_page 500 502 503 504 /app.php;
}
