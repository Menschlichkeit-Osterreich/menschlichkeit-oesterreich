# ============================================================
# OpenClaw – Capability-Matrix (Tool-Whitelist pro Rolle)
# ============================================================
# Änderungen hier erfordern Neustart des Tool-Gateways.
# Keine Rolle darf Tools außerhalb dieser Liste verwenden.
# ============================================================

roles:

  orchestrator:
    description: "Koordiniert alle anderen Agenten, verwaltet Tasks und Events"
    allowed_tools:
      - nats.publish
      - redis.get
      - redis.set
      - db.query_readonly
    path_scopes: []
    domain_allowlist: []
    rate_limit_rpm: 120
    max_bytes_read: 0
    max_bytes_write: 0

  research:
    description: "Recherchiert Informationen aus dem Web und dem Repository"
    allowed_tools:
      - http.fetch
      - fs.read
      - fs.list
      - qdrant.upsert
      - db.query_readonly
    path_scopes:
      - /workspace
    domain_allowlist:
      - github.com
      - api.github.com
      - raw.githubusercontent.com
      - menschlichkeit-oesterreich.at
      - wikipedia.org
      - docs.python.org
      - fastapi.tiangolo.com
    rate_limit_rpm: 30
    max_bytes_read: 10485760   # 10 MB
    max_bytes_write: 0

  builder:
    description: "Schreibt und modifiziert Code, erstellt Git-Branches und Commits"
    allowed_tools:
      - fs.read
      - fs.list
      - fs.write
      - git.status
      - git.diff
      - git.show
      - git.branch_create
      - git.commit
      - git.pr_prepare
    path_scopes:
      - /workspace/oc_out
      - /workspace/openclaw-system
    domain_allowlist: []
    rate_limit_rpm: 60
    max_bytes_read: 52428800   # 50 MB
    max_bytes_write: 10485760  # 10 MB

  qa:
    description: "Prüft Code-Qualität, führt Tests aus und validiert Artefakte"
    allowed_tools:
      - ci.run_local
      - fs.read
      - fs.list
      - git.diff
      - git.status
      - db.query_readonly
    path_scopes:
      - /workspace
    domain_allowlist: []
    rate_limit_rpm: 30
    max_bytes_read: 52428800
    max_bytes_write: 0

  automation:
    description: "Triggert n8n-Workflows, verwaltet Automatisierungspipelines"
    allowed_tools:
      - n8n.trigger_webhook
      - n8n.get_status
      - fs.read
      - fs.write
    path_scopes:
      - /workspace/oc_out
    domain_allowlist:
      - localhost
      - 127.0.0.1
    rate_limit_rpm: 20
    max_bytes_read: 1048576    # 1 MB
    max_bytes_write: 1048576   # 1 MB

  monetization:
    description: "Analysiert Kosten, Rentabilität und Business-KPIs"
    allowed_tools:
      - db.query_readonly
      - http.fetch
    path_scopes: []
    domain_allowlist:
      - api.stripe.com
      - api.paypal.com
      - menschlichkeit-oesterreich.at
    rate_limit_rpm: 20
    max_bytes_read: 0
    max_bytes_write: 0

# ─── Globale Einstellungen ────────────────────────────────
global:
  # Absolut verbotene Aktionen (überschreiben alle Rollen)
  forbidden_tools:
    - shell.exec
    - shell.eval
    - fs.delete
    - fs.chmod

  # Maximale Task-Budgets (Defaults, überschreibbar per Task)
  default_budgets:
    max_tool_calls: 20
    max_minutes: 15
    max_cost_estimate_eur: 0.20
    max_tokens_local: 20000
    max_tokens_cloud: 5000

  # Workspace-Root (absoluter Pfad im Container)
  workspace_root: /workspace

  # Nur diese Verzeichnisse dürfen beschrieben werden
  write_allowed_roots:
    - /workspace/oc_out
    - /workspace/openclaw-system/workspace/oc_out
