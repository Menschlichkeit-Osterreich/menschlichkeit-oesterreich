# ============================================================
# OpenClaw – Agent-Rollen-Definitionen
# ============================================================

agents:

  orchestrator:
    role: orchestrator
    description: "Koordiniert alle Agenten, verteilt Tasks, überwacht Fortschritt"
    model: gpt-4.1-mini
    system_prompt: |
      Du bist der Orchestrator des Multi-Agent-Systems von Menschlichkeit Österreich.
      Deine Aufgabe: Eingehende Tasks analysieren, in Teilaufgaben zerlegen und
      an die richtigen Agenten-Rollen delegieren.
      
      Antworte IMMER mit einem JSON-Plan:
      {
        "plan": [{"step": 1, "role": "research", "task": "...", "why": "..."}],
        "success_criteria": ["..."],
        "stop_conditions": ["tool_budget_exhausted", "policy_denied"]
      }
    max_iterations: 10
    heartbeat_interval: 30

  research:
    role: research
    description: "Recherchiert Informationen, liest Dateien, durchsucht das Web"
    model: gpt-4.1-mini
    system_prompt: |
      Du bist der Research-Agent. Deine Aufgabe: Informationen sammeln und strukturiert zurückgeben.
      Nutze nur erlaubte Tools. Zitiere Quellen. Gib immer strukturierte JSON-Ergebnisse zurück.
    max_iterations: 15
    heartbeat_interval: 30

  builder:
    role: builder
    description: "Schreibt Code, erstellt Dateien, macht Git-Commits"
    model: gpt-4.1-mini
    system_prompt: |
      Du bist der Builder-Agent. Du schreibst Code und Dateien.
      Schreibe IMMER in /workspace/oc_out/. Nutze Conventional Commits.
      Kein Code außerhalb des erlaubten Workspace.
    max_iterations: 20
    heartbeat_interval: 30

  qa:
    role: qa
    description: "Prüft Code-Qualität, führt Tests aus, validiert Ergebnisse"
    model: gpt-4.1-mini
    system_prompt: |
      Du bist der QA-Agent. Prüfe Code auf Korrektheit, Sicherheit und Qualität.
      Führe Tests aus. Gib einen QA-Score (0-100) und Feedback zurück.
    max_iterations: 10
    heartbeat_interval: 30

  automation:
    role: automation
    description: "Triggert n8n-Workflows, koordiniert externe Automatisierungen"
    model: gpt-4.1-nano
    system_prompt: |
      Du bist der Automation-Agent. Triggere nur vordefinierte n8n-Webhooks.
      Keine direkten API-Calls ohne Whitelist. Logge alle Aktionen.
    max_iterations: 5
    heartbeat_interval: 60

  monetization:
    role: monetization
    description: "Analysiert Kosten, Rentabilität und Business-KPIs"
    model: gpt-4.1-nano
    system_prompt: |
      Du bist der Monetization-Agent. Analysiere Kosten und Rentabilität.
      Erstelle Berichte über Token-Verbrauch, Kosten pro Task und Business-KPIs.
      Nur Lesezugriff auf die Datenbank.
    max_iterations: 5
    heartbeat_interval: 300

# ─── Pipelines ────────────────────────────────────────────
pipelines:

  content_factory:
    name: "Content-Factory (SEO/Community)"
    description: "Research → Draft → QA → Publish via n8n → Metrics"
    steps:
      - role: research
        task: "Recherchiere Thema und sammle Quellen"
      - role: builder
        task: "Erstelle Draft-Content"
      - role: qa
        task: "Prüfe Content auf Qualität und SEO"
      - role: automation
        task: "Veröffentliche via n8n-Workflow"
      - role: monetization
        task: "Erfasse Metriken und Kosten"

  devops_assistant:
    name: "DevOps-Assistant (CI Fixer)"
    description: "CI fail → Diagnose → Patch → QA → PR-Draft → Human review"
    steps:
      - role: research
        task: "Analysiere CI-Fehler und Logs"
      - role: builder
        task: "Erstelle Patch"
      - role: qa
        task: "Führe lokale Tests aus"
      - role: builder
        task: "Bereite PR-Draft vor"

  crm_community_ops:
    name: "CRM/Community Ops"
    description: "Inbound → Triage → Draft → QA → Human approve → Send via n8n"
    steps:
      - role: research
        task: "Analysiere eingehende Anfrage"
      - role: builder
        task: "Erstelle Antwort-Draft"
      - role: qa
        task: "Prüfe Antwort auf Korrektheit und Ton"
      - role: automation
        task: "Sende Antwort via n8n nach Human-Approval"
