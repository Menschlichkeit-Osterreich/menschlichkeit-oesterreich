# ============================================================
# nginx Security Headers – Menschlichkeit Österreich
# In Plesk: Datei einbinden via "Additional nginx directives"
# oder in /etc/nginx/conf.d/security-headers.conf ablegen
# ============================================================

# HSTS: Browser merkt sich HTTPS-Pflicht für 1 Jahr
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Kein Clickjacking – nur eigene Seite darf iframe sein
add_header X-Frame-Options "SAMEORIGIN" always;

# Kein MIME-Type-Sniffing
add_header X-Content-Type-Options "nosniff" always;

# Referrer nur zur eigenen Domain weitergeben
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Browser-Permissions einschränken
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

# Content Security Policy (anpassen je nach eingebundenen Services)
add_header Content-Security-Policy "
  default-src 'self';
  script-src 'self' 'unsafe-inline' 'unsafe-eval';
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
  img-src 'self' data: https: blob:;
  font-src 'self' https://fonts.gstatic.com;
  connect-src 'self' https://api.menschlichkeit-oesterreich.at wss://api.menschlichkeit-oesterreich.at;
  frame-src 'self';
  object-src 'none';
  base-uri 'self';
  form-action 'self';
  upgrade-insecure-requests;
" always;

# Server-Version verbergen
server_tokens off;

# Keine powered-by Header
more_clear_headers "X-Powered-By";
more_clear_headers "Server";
