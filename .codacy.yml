engines:
  eslint-8:
    enabled: true
  remark-lint:
    enabled: true
  stylelint:
    enabled: false
  trivy:
    enabled: true
  pmd:
    enabled: false

exclude_paths:
  - '.codacy/**'
  - '.agents/**'
  - '.claude/**'
  - '.gemini/**'
  - '.venv/**'
  - '**/.pytest_cache/**'
  - '**/__pycache__/**'
  - '**/.next/**'
  - '**/build/**'
  - '**/coverage/**'
  - '**/dist/**'
  - '**/node_modules/**'
  - '**/vendor/**'
  - 'attached_assets/**'
  - 'analysis/archive/**'
  - 'analysis/reports/**'
  - 'generated/**'
  - 'logs/**'
  - 'monitoring/**/dist/**'
  - 'crm.menschlichkeit-oesterreich.at/web/core/tests/**'
  - 'docs/archive/**'
  - 'figma-design-system/components/**'
  - 'quality-reports/**'
  - 'reports/**'

categories:
  CodeStyle:
    enabled: true
  ErrorProne:
    enabled: true
  Security:
    enabled: true
  Performance:
    enabled: true
