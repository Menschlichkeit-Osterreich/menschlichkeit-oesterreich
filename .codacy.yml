engines:
  eslint-8:
    enabled: true
  remark-lint:
    enabled: true
  stylelint:
    enabled: false
  trivy:
    enabled: true
  pmd:
    enabled: false

exclude_paths:
  - '.agents/**'
  - '.claude/**'
  - '.gemini/**'
  - 'attached_assets/**'
  - 'analysis/archive/**'
  - 'crm.menschlichkeit-oesterreich.at/web/core/tests/**'
  - 'docs/archive/**'
  - 'figma-design-system/**'
  - 'quality-reports/**'
  - 'reports/**'

categories:
  CodeStyle:
    enabled: true
  ErrorProne:
    enabled: true
  Security:
    enabled: true
  Performance:
    enabled: true

max-allowed-issues: 25
