# Nginx configuration for games.menschlichkeit-oesterreich.at
#
# Canonical public 3D game host for "Brücken Bauen in 3D".
# All runtime assets are served statically from the games subdomain.

server {
    listen 80;
    server_name games.menschlichkeit-oesterreich.at;
    return 301 https://games.menschlichkeit-oesterreich.at$request_uri;
}

server {
    listen 443 ssl http2;
    server_name games.menschlichkeit-oesterreich.at;

    ssl_certificate     /etc/letsencrypt/live/menschlichkeit-oesterreich.at/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/menschlichkeit-oesterreich.at/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    server_tokens off;

    root /var/www/vhosts/menschlichkeit-oesterreich.at/subdomains/games/httpdocs;
    index index.html;
    charset utf-8;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy-Report-Only "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://cdn.babylonjs.com; connect-src 'self' https:; worker-src 'self'; manifest-src 'self'; font-src 'self' data:; upgrade-insecure-requests" always;

    location = /robots.txt {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    location = /manifest.json {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp|json)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml application/json;
}
