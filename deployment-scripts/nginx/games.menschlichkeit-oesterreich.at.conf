# Nginx configuration for games.menschlichkeit-oesterreich.at
#
# Serves the 3D Brücken-Bauen game (Three.js, static files) from
# /var/www/menschlichkeit-oesterreich.at/subdomains/games/httpdocs
# which mirrors apps/game/v2/ in the repository.

server {
    listen 80;
    server_name games.menschlichkeit-oesterreich.at;
    return 301 https://games.menschlichkeit-oesterreich.at$request_uri;
}

server {
    listen 443 ssl http2;
    server_name games.menschlichkeit-oesterreich.at;

    ssl_certificate     /etc/letsencrypt/live/menschlichkeit-oesterreich.at/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/menschlichkeit-oesterreich.at/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root  /var/www/menschlichkeit-oesterreich.at/subdomains/games/httpdocs;
    index index.html;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"                     always;
    add_header X-Content-Type-Options "nosniff"                        always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "geolocation=(), microphone=()"   always;

    # Long cache for versioned/immutable assets (JS, CSS, fonts, images)
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Short cache for JSON data files (level/scenario data may update)
    location ~* \.json$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Service worker must not be cached
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
