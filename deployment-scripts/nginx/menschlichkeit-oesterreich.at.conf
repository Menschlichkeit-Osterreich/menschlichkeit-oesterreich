# Nginx configuration for www.menschlichkeit-oesterreich.at (Frontend SPA + SEO endpoints)
#
# This config:
# 1. Redirects http → https and bare domain → www
# 2. Serves the prerendered React SPA from /var/www/frontend/dist
# 3. Proxies /sitemap.xml to the FastAPI backend for dynamic generation
# 4. Adds SEO-critical headers and caching rules
#
# Security note: All redirects use explicit hardcoded hostnames (never $host or $http_host)
# to prevent Host header injection attacks. $request_uri contains the raw request path
# (attacker-controlled) but is only used as a path suffix, never in the hostname position.

# HTTP → HTTPS redirect (bare domain)
server {
    listen 80;
    server_name menschlichkeit-oesterreich.at;
    # nosemgrep: nginx-host-header-injection -- redirect target uses hardcoded hostname, not $host/$http_host
    return 301 https://www.menschlichkeit-oesterreich.at$request_uri;
}

# HTTP → HTTPS redirect (www)
server {
    listen 80;
    server_name www.menschlichkeit-oesterreich.at;
    # nosemgrep: nginx-host-header-injection -- redirect target uses hardcoded hostname, not $host/$http_host
    return 301 https://www.menschlichkeit-oesterreich.at$request_uri;
}

# HTTPS bare domain → www canonical redirect
server {
    listen 443 ssl http2;
    server_name menschlichkeit-oesterreich.at;
    # nosemgrep: nginx-host-header-injection -- redirect target uses hardcoded hostname, not $host/$http_host
    return 301 https://www.menschlichkeit-oesterreich.at$request_uri;

    # SSL managed by Certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/menschlichkeit-oesterreich.at/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/menschlichkeit-oesterreich.at/privkey.pem;
}

server {
    listen 443 ssl http2;
    server_name www.menschlichkeit-oesterreich.at;

    # SSL managed by Certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/menschlichkeit-oesterreich.at/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/menschlichkeit-oesterreich.at/privkey.pem;

    # Modern TLS
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    server_tokens off;

    root /var/www/frontend/dist;
    index index.html;
    charset utf-8;

    # --- Security Headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy-Report-Only "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; img-src 'self' data: https:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://www.paypal.com https://www.paypalobjects.com https://js.stripe.com; connect-src 'self' https: wss:; frame-src https://www.paypal.com https://www.sandbox.paypal.com https://js.stripe.com https://hooks.stripe.com; form-action 'self' https://www.paypal.com https://www.sandbox.paypal.com; upgrade-insecure-requests" always;

    # --- SEO Critical Files ---
    # robots.txt — served from dist/ (generated by Vite build from public/)
    location = /robots.txt {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # sitemap.xml — proxy to FastAPI for dynamic generation
    # Falls back to static file if API is unavailable
    location = /sitemap.xml {
        # Try static file first, then proxy to API
        try_files /sitemap.xml @sitemap_api;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location @sitemap_api {
        proxy_pass http://127.0.0.1:8001/sitemap.xml;
        proxy_set_header Host "www.menschlichkeit-oesterreich.at";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # llms.txt — AI crawler index
    location = /llms.txt {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # Legacy-Spielpfad auf die kanonische Games-Subdomain umleiten
    # nosemgrep: nginx-host-header-injection -- redirect target uses hardcoded hostname, not $host/$http_host
    location = /game {
        return 301 https://games.menschlichkeit-oesterreich.at/;
    }

    # nosemgrep: nginx-host-header-injection -- redirect target uses hardcoded hostname, not $host/$http_host
    location ~ ^/game/(.*)$ {
        return 301 https://games.menschlichkeit-oesterreich.at/$1;
    }

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # SPA: all routes fall back to the prerendered index.html or root index.html
    # With SSG prerendering, each route has its own index.html in dist/
    location / {
        try_files $uri $uri/index.html /index.html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Block access to sensitive paths — redirect to home (not login page to avoid open redirect)
    # nosemgrep: nginx-host-header-injection -- redirect target uses hardcoded hostname, not $host/$http_host
    location ~ ^/(admin|member|login|registrieren|passwort-vergessen|account)(/|$) {
        return 301 https://www.menschlichkeit-oesterreich.at/;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml application/json application/ld+json;
}
